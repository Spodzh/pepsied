<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пепсиед — Змейка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            user-select: none;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #1a0b2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Montserrat', system-ui, -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 650px;
        }

        .game-wrapper {
            background: #2c1a48;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            border: 1px solid #a55eff;
            width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #a55eff, 0 10px 25px black;
            width: 100%;
            height: auto;
            background: #2d1f3a;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 10px 0;
            gap: 10px;
            flex-wrap: wrap;
        }

        .score-panel {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.5rem;
            color: #e9c8ff;
            letter-spacing: 2px;
            border: 1px solid #b77eff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-icon {
            width: 28px;
            height: 28px;
            display: inline-block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .restart-btn, .back-to-menu {
            background: #5f2e9e;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .restart-btn:active, .back-to-menu:active {
            transform: scale(0.97);
            background: #7f4ac7;
        }

        .status {
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #f0e6b2;
            border: 1px solid #b77eff;
            text-align: center;
        }

        /* ===== КРЕСТОВИНА (новая, удобная) ===== */
        .touch-controls {
            display: none;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
        }
        .dpad {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            width: 280px;
            justify-items: center;
            align-items: center;
        }
        .dpad .empty {
            visibility: hidden;
            pointer-events: none;
        }
        .dir-btn {
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 60px;
            color: white;
            font-size: 2.4rem;
            font-weight: bold;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 #0f0719;
            touch-action: manipulation;
            user-select: none;
        }
        .dir-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f0719;
            background: #7f4ac7;
        }
        @media (max-width: 600px) {
            .dpad {
                width: 240px;
                gap: 10px;
                padding: 15px;
            }
            .dir-btn {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
        }
        @media (max-width: 450px) {
            .dpad {
                width: 200px;
                gap: 8px;
                padding: 12px;
            }
            .dir-btn {
                width: 60px;
                height: 60px;
                font-size: 1.7rem;
            }
        }
        @media (max-width: 768px) {
            .touch-controls {
                display: flex;
            }
            body {
                padding: 12px;
            }
            .game-wrapper {
                padding: 15px;
            }
            .score-panel {
                font-size: 1.2rem;
                padding: 5px 12px;
            }
            .restart-btn, .back-to-menu {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
            .status {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-wrapper">
        <canvas id="snakeCanvas" width="600" height="600"></canvas>
        <div class="info-bar">
            <div class="score-panel">
                <div id="scoreIcon" class="score-icon"></div>
                <span id="scoreValue">0</span>
            </div>
            <div class="status" id="gameStatus">🐍 Игра активна</div>
            <button class="restart-btn" id="restartGameBtn">🔄 Заново</button>
            <button class="back-to-menu" id="backToMenuBtn">🏠 В меню</button>
        </div>
    </div>
    <!-- НОВАЯ КРЕСТОВИНА (вместо старых кнопок) -->
    <div class="touch-controls">
        <div class="dpad">
            <div></div>
            <button class="dir-btn" data-dir="UP">▲</button>
            <div></div>
            <button class="dir-btn" data-dir="LEFT">◀</button>
            <button class="dir-btn" data-dir="DOWN">▼</button>
            <button class="dir-btn" data-dir="RIGHT">▶</button>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameStatusDiv = document.getElementById('gameStatus');
        const scoreIconElement = document.getElementById('scoreIcon');
        canvas.width = 600; canvas.height = 600;
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;

        // === ЗАГРУЗКА ВСЕХ КАРТИНОК ===
        // Иконка счёта (PNG)
        const scoreIconImg = new Image();
        scoreIconImg.src = "https://mir-s3-cdn-cf.behance.net/project_modules/1400/0e0066214215461.6753e7b69faf5.png";
        scoreIconImg.onload = () => {
            scoreIconElement.style.backgroundImage = `url('${scoreIconImg.src}')`;
            scoreIconElement.style.backgroundSize = 'contain';
        };
        scoreIconImg.onerror = () => {
            scoreIconElement.innerText = '🍕';
            scoreIconElement.style.fontSize = '1.4rem';
            scoreIconElement.style.backgroundImage = 'none';
        };

        // Фон игрового поля
        const backgroundImage = new Image();
        backgroundImage.src = "https://as2.ftcdn.net/jpg/03/18/48/95/1000_F_318489561_qpVjxV7GEF4btKaiD4OWe78vX737Jnzz.jpg";
        let backgroundLoaded = false;
        backgroundImage.onload = () => { backgroundLoaded = true; draw(); };
        backgroundImage.onerror = () => { backgroundLoaded = false; };

        // Еда (картинка Pepsi)
        const foodImage = new Image();
        foodImage.src = "https://i.pinimg.com/474x/fd/f9/de/fdf9de1262b8ad9522b6ff90b772f46f.jpg?nii=t";
        let foodImageLoaded = false;
        foodImage.onload = () => { foodImageLoaded = true; draw(); };
        foodImage.onerror = () => { foodImageLoaded = false; };

        // Голова змеи (PNG)
        const headImage = new Image();
        headImage.src = "https://i.ibb.co/pBkq71nP/412421.png";
        let headImageLoaded = false;
        headImage.onload = () => { headImageLoaded = true; draw(); };
        headImage.onerror = () => { headImageLoaded = false; };

        // Хвост (логотип Pepsi с прозрачным фоном)
        const tailImage = new Image();
        tailImage.src = "https://cdn-icons-png.flaticon.com/512/732/732064.png";
        let tailImageLoaded = false;
        tailImage.onload = () => { tailImageLoaded = true; draw(); };
        tailImage.onerror = () => { tailImageLoaded = false; };

        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT', nextDirection = 'RIGHT';
        let score = 0, gameLoop = null, gameActive = true, speedMs = 150;

        function goToGameOver() {
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            window.location.replace('gameover.html');
        }

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'RIGHT'; nextDirection = 'RIGHT';
            score = 0; updateScoreUI();
            gameActive = true; speedMs = 150;
            gameStatusDiv.innerText = '🐍 Игра активна';
            generateRandomFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, speedMs);
            draw();
        }

        function generateRandomFood() {
            const freeCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    let occupied = false;
                    for (let s of snake) if (s.x === i && s.y === j) { occupied = true; break; }
                    if (!occupied) freeCells.push({ x: i, y: j });
                }
            }
            if (freeCells.length === 0) {
                gameActive = false; gameStatusDiv.innerText = '🏆 ПОБЕДА!';
                if (gameLoop) clearInterval(gameLoop); gameLoop = null;
                draw(); return;
            }
            food = freeCells[Math.floor(Math.random() * freeCells.length)];
        }

        function updateScoreUI() { scoreSpan.innerText = score; }

        function moveSnake() {
            if (!gameActive) return;
            direction = nextDirection;
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT':  newHead.x--; break;
                case 'UP':    newHead.y--; break;
                case 'DOWN':  newHead.y++; break;
            }
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            if (willEat) {
                snake.unshift(newHead);
                score++;
                updateScoreUI();
                if (score % 5 === 0 && speedMs > 70) {
                    speedMs = Math.max(70, speedMs - 7);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameTick, speedMs);
                }
                generateRandomFood();
            } else {
                snake.unshift(newHead);
                snake.pop();
            }
            const head = snake[0];
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameActive = false;
                goToGameOver();
                return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameActive = false;
                    goToGameOver();
                    return;
                }
            }
            draw();
        }

        function gameTick() { if (gameActive) moveSnake(); }

        function draw() {
            // Фон
            if (backgroundLoaded && backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#2d1f3a";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            // Белая сетка
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i*CELL_SIZE, 0); ctx.lineTo(i*CELL_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*CELL_SIZE); ctx.lineTo(canvas.width, i*CELL_SIZE); ctx.stroke();
            }
            // Еда (картинка или запасной вариант)
            if (foodImageLoaded && foodImage.complete && foodImage.naturalWidth > 0) {
                ctx.drawImage(foodImage, food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            } else {
                ctx.fillStyle = "#E31837";
                ctx.beginPath();
                ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = `bold ${CELL_SIZE*0.6}px monospace`;
                ctx.fillText("P", food.x*CELL_SIZE+CELL_SIZE*0.35, food.y*CELL_SIZE+CELL_SIZE*0.7);
            }
            // Змейка: голова — PNG, тело — логотип Pepsi (или круги)
            for (let i = 0; i < snake.length; i++) {
                const s = snake[i];
                const x = s.x * CELL_SIZE, y = s.y * CELL_SIZE;
                const isHead = (i === 0);
                if (isHead && headImageLoaded && headImage.complete && headImage.naturalWidth > 0) {
                    ctx.drawImage(headImage, x, y, CELL_SIZE, CELL_SIZE);
                }
                else if (!isHead && tailImageLoaded && tailImage.complete && tailImage.naturalWidth > 0) {
                    ctx.drawImage(tailImage, x, y, CELL_SIZE, CELL_SIZE);
                }
                else {
                    const radius = CELL_SIZE * 0.4;
                    ctx.beginPath();
                    ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, radius+1, 0, Math.PI*2);
                    ctx.fillStyle = "#6a3e9a";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, radius, 0, Math.PI*2);
                    ctx.fillStyle = isHead ? "#bc7eff" : "#9a5fdf";
                    ctx.fill();
                    if (!isHead) {
                        ctx.fillStyle = "#e8d5ff";
                        ctx.font = `${CELL_SIZE*0.55}px "Segoe UI Emoji"`;
                        ctx.fillText("🐍", x+CELL_SIZE/3, y+CELL_SIZE-6);
                    }
                }
            }
        }

        function changeDirection(newDir) {
            if (!gameActive) return;
            const opp = { 'UP':'DOWN', 'DOWN':'UP', 'LEFT':'RIGHT', 'RIGHT':'LEFT' };
            if (opp[newDir] !== direction) nextDirection = newDir;
        }

        // Управление с клавиатуры
        window.addEventListener('keydown', (e) => {
            const k = e.key;
            if (k === 'ArrowUp') changeDirection('UP');
            else if (k === 'ArrowDown') changeDirection('DOWN');
            else if (k === 'ArrowLeft') changeDirection('LEFT');
            else if (k === 'ArrowRight') changeDirection('RIGHT');
            e.preventDefault();
        });

        // Управление с новой крестовины
        document.querySelectorAll('.dir-btn').forEach(btn => {
            const dir = btn.getAttribute('data-dir');
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                changeDirection(dir);
            });
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                changeDirection(dir);
            });
        });

        // Кнопки "Заново" и "В меню"
        document.getElementById('restartGameBtn').addEventListener('click', () => { if(gameLoop) clearInterval(gameLoop); initGame(); });
        document.getElementById('restartGameBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(gameLoop) clearInterval(gameLoop); initGame(); });
        document.getElementById('backToMenuBtn').addEventListener('click', () => window.location.href = 'index.html');
        document.getElementById('backToMenuBtn').addEventListener('touchstart', (e) => { e.preventDefault(); window.location.href = 'index.html'; });

        initGame();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пепсиед — Змейка</title>
    <style>
        /* Стили остаются как в прошлый раз, я их не меняю. 
           Для краткости оставлю ту же структуру, что была в последней версии без лишней надписи "Игра активна". */
        * { margin: 0; padding: 0; user-select: none; box-sizing: border-box; touch-action: manipulation; }
        body { background: #1a0b2e; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif; padding: 16px; margin: 0; }
        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 650px; position: relative; }
        .game-wrapper { background: #2c1a48; border-radius: 48px; padding: 20px; box-shadow: 0 25px 40px rgba(0,0,0,0.6); border: 1px solid #a55eff; width: 100%; }
        canvas { display: block; margin: 0 auto; border-radius: 24px; box-shadow: 0 0 0 3px #a55eff, 0 10px 25px black; width: 100%; height: auto; background: #2d1f3a; cursor: pointer; }
        .info-bar { display: flex; justify-content: space-between; align-items: center; margin: 20px 10px 0; gap: 10px; flex-wrap: wrap; }
        .score-panel { background: #000000aa; backdrop-filter: blur(4px); padding: 8px 18px; border-radius: 50px; font-weight: bold; font-family: monospace; font-size: 1.5rem; color: #e9c8ff; border: 1px solid #b77eff; display: flex; align-items: center; gap: 8px; }
        .score-icon { width: 28px; height: 28px; display: inline-block; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .record-panel { background: #000000aa; backdrop-filter: blur(4px); padding: 8px 18px; border-radius: 50px; font-size: 1.2rem; color: #ffd966; border: 1px solid #b77eff; display: flex; align-items: center; gap: 6px; }
        .lives-panel { background: #000000aa; padding: 5px 15px; border-radius: 50px; display: flex; gap: 5px; font-size: 1.3rem; }
        .restart-btn, .back-to-menu, .pause-btn, .sound-toggle { background: #5f2e9e; border: none; color: white; font-weight: bold; font-size: 0.9rem; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .touch-controls { display: none; justify-content: center; margin-top: 30px; width: 100%; }
        .dpad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 80px; backdrop-filter: blur(4px); width: 280px; justify-items: center; align-items: center; }
        .dir-btn { background: #2c1a48; border: 2px solid #a55eff; border-radius: 60px; color: white; font-size: 2.4rem; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #0f0719; }
        .dir-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0f0719; background: #7f4ac7; }
        @media (max-width: 768px) { .touch-controls { display: flex; } .dir-btn { width: 65px; height: 65px; font-size: 1.8rem; } .dpad { width: 240px; gap: 8px; padding: 15px; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-wrapper">
        <canvas id="snakeCanvas" width="600" height="600"></canvas>
        <div class="info-bar">
            <div class="score-panel"><div id="scoreIcon" class="score-icon"></div><span id="scoreValue">0</span></div>
            <div class="record-panel"><span>🏅 Рекорд:</span><span id="recordValue">0</span></div>
            <div id="livesPanel" class="lives-panel">❤️❤️❤️</div>
            <button class="pause-btn" id="pauseBtn">⏸️ Пауза</button>
            <button class="sound-toggle" id="soundToggleBtn">🔊 Звук</button>
            <button class="restart-btn" id="restartGameBtn">🔄 Заново</button>
            <button class="back-to-menu" id="backToMenuBtn">🏠 В меню</button>
        </div>
    </div>
    <div class="touch-controls">
        <div class="dpad">
            <div></div><button class="dir-btn" data-dir="UP">▲</button><div></div>
            <button class="dir-btn" data-dir="LEFT">◀</button>
            <button class="dir-btn" data-dir="DOWN">▼</button>
            <button class="dir-btn" data-dir="RIGHT">▶</button>
            <div></div><div></div><div></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---- МАССИВ СКИНОВ (синхронизирован с index.html) ----
        const skinUrls = [
            "https://i.ibb.co/pBkq71nP/412421.png",   // Дана
            "https://i.ibb.co/VW19FvXh/image.png",   // Настя
            "https://i.ibb.co/JW06HZK3/image.png"    // Влад
        ];
        let savedSkinIndex = localStorage.getItem('pepsiedSkinIndex');
        let skinIndex = 0;
        if (savedSkinIndex !== null && !isNaN(parseInt(savedSkinIndex))) {
            let idx = parseInt(savedSkinIndex);
            if (idx >= 0 && idx < skinUrls.length) skinIndex = idx;
        }
        const headImageUrl = skinUrls[skinIndex];
        
        // ------ МОНЕТЫ И ДОСТИЖЕНИЯ ------
        let coins = localStorage.getItem('pepsiedCoins') ? parseInt(localStorage.getItem('pepsiedCoins')) : 0;
        let totalCollected = localStorage.getItem('pepsiedTotalCollected') ? parseInt(localStorage.getItem('pepsiedTotalCollected')) : 0;
        let achievements = {
            firstWin: false, fiftyCollected: false, speedDemon: false, skinChanger: false, bonusMaster: false
        };
        const savedAchievements = localStorage.getItem('pepsiedAchievements');
        if (savedAchievements) {
            try { achievements = JSON.parse(savedAchievements); } catch(e) {}
        }
        function saveAchievements() {
            localStorage.setItem('pepsiedAchievements', JSON.stringify(achievements));
        }
        function addCoins(amount) {
            coins += amount;
            localStorage.setItem('pepsiedCoins', coins);
        }
        function updateTotalCollected(amount) {
            totalCollected += amount;
            localStorage.setItem('pepsiedTotalCollected', totalCollected);
            if (!achievements.fiftyCollected && totalCollected >= 50) {
                achievements.fiftyCollected = true;
                saveAchievements();
                addCoins(20);
            }
        }
        
        // ------ ЗВУКИ (Web Audio API) ------
        let audioCtx = null;
        let soundEnabled = localStorage.getItem('pepsiedSound') !== 'false';
        function initAudio() {
            if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
            if (type === 'eat') {
                oscillator.frequency.setValueAtTime(880, now);
                oscillator.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                oscillator.type = 'sine';
            } else if (type === 'bonus') {
                oscillator.frequency.setValueAtTime(1200, now);
                oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                oscillator.type = 'triangle';
            } else if (type === 'death') {
                oscillator.frequency.setValueAtTime(300, now);
                oscillator.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                oscillator.type = 'sawtooth';
            } else if (type === 'win') {
                oscillator.frequency.setValueAtTime(800, now);
                oscillator.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                oscillator.type = 'square';
            }
            oscillator.start();
            oscillator.stop(now + 0.3);
        }
        
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        soundToggleBtn.innerText = soundEnabled ? "🔊 Звук" : "🔇 Звук";
        soundToggleBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            localStorage.setItem('pepsiedSound', soundEnabled);
            soundToggleBtn.innerText = soundEnabled ? "🔊 Звук" : "🔇 Звук";
            if (soundEnabled && audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });
        
        // ------ КАНВАС И ПЕРЕМЕННЫЕ ------
        const skinUrls = [
    "https://i.ibb.co/pBkq71nP/412421.png",   // Дана
    "https://i.ibb.co/VW19FvXh/image.png",   // Настя
    "https://i.ibb.co/JW06HZK3/image.png"    // Влад
];
let savedSkinIndex = localStorage.getItem('pepsiedSkinIndex');
let skinIndex = 0;
if (savedSkinIndex !== null && !isNaN(parseInt(savedSkinIndex))) {
    let idx = parseInt(savedSkinIndex);
    if (idx >= 0 && idx < skinUrls.length) skinIndex = idx;
}
const headImageUrl = skinUrls[skinIndex];
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const recordSpan = document.getElementById('recordValue');
        const scoreIconElement = document.getElementById('scoreIcon');
        const livesPanel = document.getElementById('livesPanel');
        canvas.width = 600; canvas.height = 600;
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        
        let personalBest = localStorage.getItem('pepsiedPersonalBest') ? parseInt(localStorage.getItem('pepsiedPersonalBest')) : 0;
        recordSpan.innerText = personalBest;
        function updatePersonalBest(score) {
            if (score > personalBest) {
                personalBest = score;
                localStorage.setItem('pepsiedPersonalBest', personalBest);
                recordSpan.innerText = personalBest;
                addCoins(5);
            }
        }
        
        // ------ КАРТИНКИ ------
        const grassBackground = new Image();
        grassBackground.src = "https://art.pixilart.com/6387674a5f8851d.png";
        let grassLoaded = false;
        grassBackground.onload = () => { grassLoaded = true; draw(); };
        
        const scoreIconImg = new Image();
        scoreIconImg.src = "https://mir-s3-cdn-cf.behance.net/project_modules/1400/0e0066214215461.6753e7b69faf5.png";
        scoreIconImg.onload = () => { scoreIconElement.style.backgroundImage = `url('${scoreIconImg.src}')`; scoreIconElement.style.backgroundSize = 'contain'; };
        
        const foodImage = new Image();
        foodImage.src = "https://i.pinimg.com/474x/fd/f9/de/fdf9de1262b8ad9522b6ff90b772f46f.jpg?nii=t";
        let foodImageLoaded = false;
        foodImage.onload = () => { foodImageLoaded = true; draw(); };
        
        const headImage = new Image();
        headImage.src = headImageUrl;
        let headImageLoaded = false;
        headImage.onload = () => { headImageLoaded = true; draw(); };
        
        const tailImage = new Image();
        tailImage.src = "https://cdn-icons-png.flaticon.com/512/732/732064.png";
        let tailImageLoaded = false;
        tailImage.onload = () => { tailImageLoaded = true; draw(); };
        
        // ------ БОНУСЫ ------
        let bonus = null;
        let activeEffects = { speedMult: 1, scoreMult: 1, effectEndTime: 0 };
        let bonusEatenThisGame = 0;
        function spawnBonus() {
            if (bonus && bonus.active) return;
            if (Math.random() > 0.02) return;
            const freeCells = [];
            for (let i=0; i<GRID_SIZE; i++) {
                for (let j=0; j<GRID_SIZE; j++) {
                    let occupied = false;
                    for (let s of snake) if (s.x===i && s.y===j) { occupied=true; break; }
                    if (!occupied && !(food.x===i && food.y===j)) freeCells.push({x:i, y:j});
                }
            }
            if (freeCells.length===0) return;
            const pos = freeCells[Math.floor(Math.random()*freeCells.length)];
            const type = Math.floor(Math.random()*3);
            bonus = { x: pos.x, y: pos.y, type: type, active: true, endTime: Date.now() + 5000 };
        }
        function eatBonus(bonusItem) {
            bonusEatenThisGame++;
            if (!achievements.bonusMaster && bonusEatenThisGame >= 3) {
                achievements.bonusMaster = true;
                saveAchievements();
                addCoins(15);
            }
            playSound('bonus');
            switch(bonusItem.type) {
                case 0: activeEffects.speedMult = 1.5; activeEffects.effectEndTime = Date.now()+5000; if(gameLoop) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs/activeEffects.speedMult); } break;
                case 1: activeEffects.speedMult = 0.7; activeEffects.effectEndTime = Date.now()+5000; if(gameLoop) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs/activeEffects.speedMult); } break;
                case 2: activeEffects.scoreMult = 2; activeEffects.effectEndTime = Date.now()+5000; break;
            }
            bonus.active = false;
            bonus = null;
        }
        
        // ------ ПАУЗА ------
        let paused = false;
        const pauseBtn = document.getElementById('pauseBtn');
        function togglePause() {
            if (!gameActive) return;
            paused = !paused;
            if (paused) {
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = null;
                pauseBtn.innerText = '▶️ Старт';
            } else {
                pauseBtn.innerText = '⏸️ Пауза';
                gameLoop = setInterval(gameTick, speedMs / (activeEffects.speedMult || 1));
            }
            draw();
        }
        pauseBtn.addEventListener('click', togglePause);
        
        // ------ АНИМАЦИЯ ЧАСТИЦ ------
        let particles = [];
        function addParticles(x, y) {
            for (let i=0; i<8; i++) {
                particles.push({
                    x: x + CELL_SIZE/2, y: y + CELL_SIZE/2,
                    vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 20
                });
            }
        }
        function updateParticles() {
            for (let i=0; i<particles.length; i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) { particles.splice(i,1); i--; }
            }
        }
        function drawParticles() {
            for (let p of particles) {
                ctx.fillStyle = `rgba(255,200,100,${p.life/20})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            }
        }
        
        // ------ ИГРОВЫЕ ПЕРЕМЕННЫЕ ------
        let snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
        let food = {x:12,y:12};
        let direction = 'RIGHT', nextDirection = 'RIGHT';
        let score = 0, gameLoop = null, gameActive = true, speedMs = baseSpeed;
        let lives = 3;
        let winScore = isEndless ? Infinity : 25;
        
        function updateLivesDisplay() {
            if (isThreeLives) {
                let hearts = '';
                for (let i=0; i<lives; i++) hearts += '❤️';
                for (let i=lives; i<3; i++) hearts += '🖤';
                livesPanel.innerHTML = hearts;
                livesPanel.style.display = 'flex';
            } else {
                livesPanel.style.display = 'none';
            }
        }
        updateLivesDisplay();
        
        function checkWin() {
            if (!isEndless && score >= winScore) {
                gameActive = false;
                if (gameLoop) clearInterval(gameLoop); gameLoop = null;
                updatePersonalBest(score);
                if (!achievements.firstWin) {
                    achievements.firstWin = true;
                    saveAchievements();
                    addCoins(30);
                }
                playSound('win');
                window.location.replace('win.html');
                return true;
            }
            return false;
        }
        
        function resetSnakeAfterLifeLoss() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            direction = 'RIGHT'; nextDirection = 'RIGHT';
            gameActive = true;
            speedMs = Math.max(70, baseSpeed - Math.floor(score/5)*speedIncreaseFactor);
            activeEffects = { speedMult: 1, scoreMult: 1, effectEndTime: 0 };
            bonus = null;
            generateRandomFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, speedMs / (activeEffects.speedMult || 1));
            draw();
        }
        
        function goToGameOver() {
            if (isThreeLives && lives > 0) {
                lives--;
                updateLivesDisplay();
                if (lives === 0) {
                    gameActive = false;
                    if (gameLoop) clearInterval(gameLoop); gameLoop = null;
                    updatePersonalBest(score);
                    updateTotalCollected(score);
                    playSound('death');
                    window.location.replace('gameover.html');
                } else {
                    playSound('death');
                    resetSnakeAfterLifeLoss();
                }
                return;
            } else {
                gameActive = false;
                if (gameLoop) clearInterval(gameLoop); gameLoop = null;
                updatePersonalBest(score);
                updateTotalCollected(score);
                playSound('death');
                window.location.replace('gameover.html');
            }
        }
        
        function initGame() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            direction = 'RIGHT'; nextDirection = 'RIGHT';
            score = 0; updateScoreUI();
            gameActive = true; speedMs = baseSpeed;
            activeEffects = { speedMult: 1, scoreMult: 1, effectEndTime: 0 };
            bonusEatenThisGame = 0;
            bonus = null;
            particles = [];
            paused = false;
            pauseBtn.innerText = '⏸️ Пауза';
            if (isThreeLives) lives = 3;
            updateLivesDisplay();
            generateRandomFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, speedMs);
            draw();
        }
        
        function generateRandomFood() {
            const freeCells = [];
            for (let i=0; i<GRID_SIZE; i++) {
                for (let j=0; j<GRID_SIZE; j++) {
                    let occupied = false;
                    for (let s of snake) if (s.x===i && s.y===j) { occupied=true; break; }
                    if (!occupied && (!bonus || !(bonus.x===i && bonus.y===j))) freeCells.push({x:i, y:j});
                }
            }
            if (freeCells.length===0) {
                gameActive = false;
                if (gameLoop) clearInterval(gameLoop); gameLoop=null;
                draw(); return;
            }
            food = freeCells[Math.floor(Math.random()*freeCells.length)];
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
            if (score > personalBest) {
                personalBest = score;
                localStorage.setItem('pepsiedPersonalBest', personalBest);
                recordSpan.innerText = personalBest;
                addCoins(5);
            }
            if (!achievements.speedDemon && speedMs <= 80 && score >= 15) {
                achievements.speedDemon = true;
                saveAchievements();
                addCoins(15);
            }
        }
        
        function moveSnake() {
            if (!gameActive || paused) return;
            direction = nextDirection;
            let newHead = {...snake[0]};
            switch(direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT': newHead.x--; break;
                case 'UP': newHead.y--; break;
                case 'DOWN': newHead.y++; break;
            }
            const willEat = (newHead.x===food.x && newHead.y===food.y);
            if (bonus && bonus.active && newHead.x===bonus.x && newHead.y===bonus.y) {
                eatBonus(bonus);
                addParticles(bonus.x*CELL_SIZE, bonus.y*CELL_SIZE);
            }
            if (willEat) {
                snake.unshift(newHead);
                let addScore = 1;
                if (activeEffects.scoreMult > 1 && Date.now() < activeEffects.effectEndTime) addScore = 2;
                score += addScore;
                updateScoreUI();
                addParticles(food.x*CELL_SIZE, food.y*CELL_SIZE);
                playSound('eat');
                if (checkWin()) return;
                if (score % 5 === 0 && speedMs > 70) {
                    speedMs = Math.max(70, speedMs - speedIncreaseFactor);
                    if (!paused && gameActive) {
                        clearInterval(gameLoop);
                        gameLoop = setInterval(gameTick, speedMs / (activeEffects.speedMult || 1));
                    }
                }
                generateRandomFood();
            } else {
                snake.unshift(newHead);
                snake.pop();
            }
            if (!bonus || !bonus.active) spawnBonus();
            if (bonus && bonus.active && Date.now() > bonus.endTime) { bonus.active = false; bonus = null; }
            if (activeEffects.effectEndTime && Date.now() > activeEffects.effectEndTime) {
                activeEffects.speedMult = 1; activeEffects.scoreMult = 1;
                if (!paused && gameActive) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameTick, speedMs);
                }
            }
            const head = snake[0];
            if (head.x<0 || head.x>=GRID_SIZE || head.y<0 || head.y>=GRID_SIZE) {
                goToGameOver();
                return;
            }
            for (let i=1; i<snake.length; i++) {
                if (snake[i].x===head.x && snake[i].y===head.y) {
                    goToGameOver();
                    return;
                }
            }
            draw();
        }
        
        function gameTick() { moveSnake(); updateParticles(); }
        
        function draw() {
            if (grassLoaded && grassBackground.complete && grassBackground.naturalWidth>0) {
                ctx.drawImage(grassBackground, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#2d1f3a";
                ctx.fillRect(0,0,canvas.width,canvas.height);
            }
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
            for (let i=0; i<=GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(canvas.width,i*CELL_SIZE); ctx.stroke();
            }
            if (foodImageLoaded && foodImage.complete && foodImage.naturalWidth>0) {
                ctx.drawImage(foodImage, food.x*CELL_SIZE, food.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
            } else {
                ctx.fillStyle = "#E31837";
                ctx.beginPath(); ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.4, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle="white"; ctx.font = `bold ${CELL_SIZE*0.6}px monospace`; ctx.fillText("P", food.x*CELL_SIZE+CELL_SIZE*0.35, food.y*CELL_SIZE+CELL_SIZE*0.7);
            }
            if (bonus && bonus.active) {
                const b = bonus;
                ctx.fillStyle = b.type===0?"#00ffaa":(b.type===1?"#66ccff":"#ffcc44");
                ctx.beginPath(); ctx.arc(b.x*CELL_SIZE+CELL_SIZE/2, b.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.3, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = `bold ${CELL_SIZE*0.5}px monospace`; ctx.fillText(b.type===0?"⚡":(b.type===1?"🐢":"2x"), b.x*CELL_SIZE+CELL_SIZE*0.35, b.y*CELL_SIZE+CELL_SIZE*0.7);
            }
            for (let i=0; i<snake.length; i++) {
                const s = snake[i];
                const x = s.x*CELL_SIZE, y = s.y*CELL_SIZE;
                const isHead = (i===0);
                if (isHead && headImageLoaded && headImage.complete && headImage.naturalWidth>0) {
                    ctx.drawImage(headImage, x, y, CELL_SIZE, CELL_SIZE);
                } else if (isHead) {
                    const radius = CELL_SIZE*0.4;
                    ctx.beginPath(); ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, radius+1, 0, 2*Math.PI); ctx.fillStyle = "#bc7eff"; ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = `bold ${CELL_SIZE*0.5}px monospace`; ctx.fillText("?", x+CELL_SIZE/2-6, y+CELL_SIZE/2+8);
                } else if (!isHead && tailImageLoaded && tailImage.complete && tailImage.naturalWidth>0) {
                    ctx.drawImage(tailImage, x, y, CELL_SIZE, CELL_SIZE);
                } else {
                    const radius = CELL_SIZE*0.4;
                    ctx.beginPath(); ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, radius+1, 0, 2*Math.PI); ctx.fillStyle = "#6a3e9a"; ctx.fill();
                    ctx.beginPath(); ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, radius, 0, 2*Math.PI); ctx.fillStyle = "#9a5fdf"; ctx.fill();
                    ctx.fillStyle = "#e8d5ff"; ctx.font = `${CELL_SIZE*0.55}px "Segoe UI Emoji"`; ctx.fillText("🐍", x+CELL_SIZE/3, y+CELL_SIZE-6);
                }
            }
            drawParticles();
            if (paused) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font = "bold 30px system-ui"; ctx.fillStyle = "white"; ctx.fillText("ПАУЗА", canvas.width/2-70, canvas.height/2);
            }
        }
        
        function changeDirection(newDir) {
            if (!gameActive || paused) return;
            const opp = {'UP':'DOWN','DOWN':'UP','LEFT':'RIGHT','RIGHT':'LEFT'};
            if (opp[newDir] !== direction) nextDirection = newDir;
        }
        window.addEventListener('keydown', (e) => {
            const k = e.key;
            if (k === 'ArrowUp') changeDirection('UP');
            else if (k === 'ArrowDown') changeDirection('DOWN');
            else if (k === 'ArrowLeft') changeDirection('LEFT');
            else if (k === 'ArrowRight') changeDirection('RIGHT');
            e.preventDefault();
        });
        document.querySelectorAll('.dir-btn').forEach(btn => {
            const dir = btn.getAttribute('data-dir');
            btn.addEventListener('click', (e) => { e.preventDefault(); changeDirection(dir); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(dir); });
        });
        document.getElementById('restartGameBtn').addEventListener('click', () => { if(gameLoop) clearInterval(gameLoop); initGame(); });
        document.getElementById('restartGameBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(gameLoop) clearInterval(gameLoop); initGame(); });
        document.getElementById('backToMenuBtn').addEventListener('click', () => window.location.href = 'index.html');
        document.getElementById('backToMenuBtn').addEventListener('touchstart', (e) => { e.preventDefault(); window.location.href = 'index.html'; });
        
        initGame();
    })();
</script>
</body>
</html>

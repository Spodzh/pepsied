<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пепсиед — Змейка (мега-обновление)</title>
    <style>
        * { margin: 0; padding: 0; user-select: none; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #1a0b2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif;
            padding: 16px;
            margin: 0;
            overflow: hidden;
            transition: background 0.3s;
        }
        body.dark-mode {
            background: #000000;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 650px;
            position: relative;
            z-index: 2;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.15);
            border-radius: 1000px;
            filter: blur(20px);
            animation: moveCloud linear infinite;
        }
        @keyframes moveCloud {
            0% { transform: translateX(-20%); }
            100% { transform: translateX(120%); }
        }
        .game-wrapper {
            background: #2c1a48cc;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            border: 1px solid #a55eff;
            width: 100%;
            position: relative;
            z-index: 1;
            transition: background 0.3s;
        }
        body.dark-mode .game-wrapper {
            background: #0a0a0acc;
            border-color: #ffcc44;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #a55eff, 0 10px 25px black;
            width: 100%;
            height: auto;
            background: #2d1f3a;
            cursor: pointer;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 10px 0;
            gap: 10px;
            flex-wrap: wrap;
        }
        .score-panel {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.5rem;
            color: #e9c8ff;
            border: 1px solid #b77eff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .combo-panel {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 1.2rem;
            color: #ffaa44;
        }
        .record-panel, .lives-panel, .restart-btn, .back-to-menu, .pause-btn, .sound-toggle {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 1rem;
            color: #ffd966;
            border: 1px solid #b77eff;
        }
        button {
            background: #5f2e9e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 40px;
            cursor: pointer;
        }
        .touch-controls {
            display: none;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
        }
        .dpad {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            width: 280px;
            justify-items: center;
            align-items: center;
        }
        .dir-btn {
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 60px;
            color: white;
            font-size: 2.4rem;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f0719;
        }
        .dir-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f0719;
            background: #7f4ac7;
        }
        @media (max-width: 768px) {
            .touch-controls { display: flex; }
            .dir-btn { width: 65px; height: 65px; font-size: 1.8rem; }
            .dpad { width: 240px; gap: 8px; padding: 15px; }
        }
    </style>
</head>
<body>
<div class="animated-bg" id="animatedBg"></div>
<div class="game-container">
    <div class="game-wrapper">
        <canvas id="snakeCanvas" width="600" height="600"></canvas>
        <div class="info-bar">
            <div class="score-panel"><span>🍕</span> <span id="scoreValue">0</span></div>
            <div class="combo-panel" id="comboDisplay">x1</div>
            <div class="record-panel">🏅 <span id="recordValue">0</span></div>
            <div id="livesPanel" class="lives-panel">❤️❤️❤️</div>
            <button class="pause-btn" id="pauseBtn">⏸️</button>
            <button class="sound-toggle" id="soundToggleBtn">🔊</button>
            <button class="restart-btn" id="restartGameBtn">🔄</button>
            <button class="back-to-menu" id="backToMenuBtn">🏠</button>
        </div>
    </div>
    <div class="touch-controls" id="touchControls">
        <div class="dpad">
            <div></div><button class="dir-btn" data-dir="UP">▲</button><div></div>
            <button class="dir-btn" data-dir="LEFT">◀</button>
            <button class="dir-btn" data-dir="DOWN">▼</button>
            <button class="dir-btn" data-dir="RIGHT">▶</button>
            <div></div><div></div><div></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // -------------------- ЗАГРУЗКА НАСТРОЕК --------------------
        const touchEnabled = localStorage.getItem('pepsiedTouchEnabled') !== 'false';
        if (!touchEnabled) document.getElementById('touchControls').style.display = 'none';
        let soundEnabled = localStorage.getItem('pepsiedSound') !== 'false';
        let volume = localStorage.getItem('pepsiedVolume') ? parseInt(localStorage.getItem('pepsiedVolume')) : 70;
        let darkMode = localStorage.getItem('pepsiedDarkMode') === 'true';
        if (darkMode) document.body.classList.add('dark-mode');
        const difficulty = localStorage.getItem('pepsiedDifficulty') || "normal";
        let baseSpeed = 150, speedInc = 7;
        if (difficulty === 'easy') { baseSpeed = 180; speedInc = 5; }
        if (difficulty === 'hard') { baseSpeed = 120; speedInc = 10; }
        const gameMode = localStorage.getItem('pepsiedGameMode') || "classic";
        const isEndless = (gameMode === 'endless');
        const isThreeLives = (gameMode === '3lives');

        // -------------------- ЗВУКИ --------------------
        let audioCtx = null;
        function initAudio() { if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.2 * volume/100, now);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
            if (type === 'eat') {
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                osc.type = 'sine';
            } else if (type === 'canopen') {
                osc.frequency.setValueAtTime(660, now);
                osc.frequency.exponentialRampToValueAtTime(330, now + 0.08);
                osc.type = 'triangle';
            } else if (type === 'bonus') {
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                osc.type = 'triangle';
            } else if (type === 'death') {
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
                osc.type = 'sawtooth';
            } else if (type === 'win') {
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                osc.type = 'square';
            }
            osc.start(); osc.stop(now + 0.3);
        }
        document.getElementById('soundToggleBtn').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            localStorage.setItem('pepsiedSound', soundEnabled);
            document.getElementById('soundToggleBtn').innerText = soundEnabled ? "🔊" : "🔇";
        });

        // -------------------- ЗАГРУЗКА СКИНОВ (ГОЛОВА И ХВОСТ) --------------------
        const headUrls = [
            "https://i.ibb.co/pBkq71nP/412421.png",
            "https://i.ibb.co/VW19FvXh/image.png",
            "https://i.ibb.co/JW06HZK3/image.png"
        ];
        const tailIcons = {
            0: "🥤", 1: "💧", 2: "🧯", 3: "⭕", 4: "✨"
        };
        let headIdx = parseInt(localStorage.getItem('pepsiedHeadIndex')) || 0;
        if (headIdx < 0 || headIdx >= headUrls.length) headIdx = 0;
        let tailIdx = parseInt(localStorage.getItem('pepsiedTailIndex')) || 0;
        const headImage = new Image(); headImage.src = headUrls[headIdx];
        let headLoaded = false;
        headImage.onload = () => { headLoaded = true; draw(); };

        // -------------------- ФОН (трава + облака) --------------------
        const grass = new Image();
        grass.src = "https://art.pixilart.com/6387674a5f8851d.png";
        let grassLoaded = false;
        grass.onload = () => { grassLoaded = true; draw(); };
        // Облака
        const bgDiv = document.getElementById('animatedBg');
        for (let i=0; i<8; i++) {
            let cloud = document.createElement('div');
            cloud.className = 'cloud';
            let size = 80 + Math.random() * 150;
            cloud.style.width = size + 'px';
            cloud.style.height = size * 0.6 + 'px';
            cloud.style.top = Math.random() * 100 + '%';
            cloud.style.left = Math.random() * 100 + '%';
            cloud.style.animationDuration = 20 + Math.random() * 30 + 's';
            cloud.style.animationDelay = Math.random() * 20 + 's';
            bgDiv.appendChild(cloud);
        }

        // -------------------- ИГРОВЫЕ ПАРАМЕТРЫ --------------------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 600;
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;

        // Статистика и прогрессия
        let totalCollected = localStorage.getItem('pepsiedTotalCollected') ? parseInt(localStorage.getItem('pepsiedTotalCollected')) : 0;
        let personalBest = localStorage.getItem('pepsiedPersonalBest') ? parseInt(localStorage.getItem('pepsiedPersonalBest')) : 0;
        document.getElementById('recordValue').innerText = personalBest;
        let coins = localStorage.getItem('pepsiedCoins') ? parseInt(localStorage.getItem('pepsiedCoins')) : 0;
        let snakeLevel = localStorage.getItem('pepsiedSnakeLevel') ? parseInt(localStorage.getItem('pepsiedSnakeLevel')) : 1;
        let snakeExp = localStorage.getItem('pepsiedSnakeExp') ? parseInt(localStorage.getItem('pepsiedSnakeExp')) : 0;
        const expPerLevel = 100;
        function addExp(amount) {
            snakeExp += amount;
            while (snakeExp >= expPerLevel) {
                snakeExp -= expPerLevel;
                snakeLevel++;
                localStorage.setItem('pepsiedSnakeLevel', snakeLevel);
                // Увеличение стартовой длины на 1 за каждый уровень (но не более 5)
                if (snakeLevel <= 5) startLengthBonus = Math.min(5, snakeLevel-1);
                else startLengthBonus = 5;
            }
            localStorage.setItem('pepsiedSnakeExp', snakeExp);
        }
        let startLengthBonus = Math.min(5, snakeLevel-1);
        
        // Ежедневные задания (прогресс)
        let dailyQuests = JSON.parse(localStorage.getItem('pepsiedDailyQuests')) || { collect: 0, surviveTime: 0, completed: false, lastReset: new Date().toDateString() };
        function updateDailyCollect(amount) {
            const today = new Date().toDateString();
            if (dailyQuests.lastReset !== today) {
                dailyQuests = { collect: 0, surviveTime: 0, completed: false, lastReset: today };
            }
            if (!dailyQuests.completed) {
                dailyQuests.collect += amount;
                if (dailyQuests.collect >= 50) {
                    dailyQuests.completed = true;
                    coins += 20;
                    localStorage.setItem('pepsiedCoins', coins);
                    playSound('bonus');
                }
                localStorage.setItem('pepsiedDailyQuests', JSON.stringify(dailyQuests));
            }
        }
        function updateDailyTime(seconds) {
            const today = new Date().toDateString();
            if (dailyQuests.lastReset !== today) {
                dailyQuests = { collect: 0, surviveTime: 0, completed: false, lastReset: today };
            }
            if (!dailyQuests.completed) {
                dailyQuests.surviveTime += seconds;
                if (dailyQuests.surviveTime >= 120) {
                    dailyQuests.completed = true;
                    coins += 20;
                    localStorage.setItem('pepsiedCoins', coins);
                    playSound('bonus');
                }
                localStorage.setItem('pepsiedDailyQuests', JSON.stringify(dailyQuests));
            }
        }

        // -------------------- МЕХАНИКИ --------------------
        let snake = [];
        let food = { x: 12, y: 12, isGolden: false };
        let direction = 'RIGHT', nextDir = 'RIGHT';
        let score = 0, gameLoop = null, gameActive = true, speedMs = baseSpeed;
        let lives = 3;
        let winScore = isEndless ? Infinity : 25;
        
        // Магнит
        let magnetActive = false;
        let magnetEndTime = 0;
        // Тень
        let trail = []; // массив позиций головы за последние TRAIL_LENGTH шагов
        const TRAIL_LENGTH = 10;
        // Комбо
        let combo = 1;
        let lastEatTime = 0;
        const COMBO_WINDOW = 1500;
        // Бонусы (стандартные + магнит)
        let bonus = null;
        let activeEffects = { speedMult: 1, scoreMult: 1, effectEndTime: 0 };
        let bonusEatenThisGame = 0;
        let particles = [];
        let paused = false;
        let turnCounter = 0;
        let gameStartTime = Date.now();
        
        function initGame() {
            let startLength = 3 + startLengthBonus;
            snake = [];
            for (let i=0; i<startLength; i++) {
                snake.push({ x: 10 - i, y: 10 });
            }
            direction = 'RIGHT'; nextDir = 'RIGHT';
            score = 0; combo = 1; updateScoreUI();
            gameActive = true; speedMs = baseSpeed;
            activeEffects = { speedMult:1, scoreMult:1, effectEndTime:0 };
            magnetActive = false;
            bonusEatenThisGame = 0;
            bonus = null;
            particles = [];
            trail = [];
            paused = false;
            turnCounter = 0;
            if (isThreeLives) lives = 3;
            updateLivesDisplay();
            generateRandomFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, speedMs);
            gameStartTime = Date.now();
            draw();
        }
        
        function generateRandomFood() {
            const free = [];
            for (let i=0; i<GRID_SIZE; i++) for (let j=0; j<GRID_SIZE; j++) {
                let occ = false;
                for (let s of snake) if (s.x===i && s.y===j) { occ=true; break; }
                if (!occ && (!bonus || !(bonus.x===i && bonus.y===j))) free.push({x:i, y:j});
            }
            if (!free.length) { gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null; return; }
            let pos = free[Math.floor(Math.random()*free.length)];
            let isGolden = (Math.random() < 0.15); // 15% шанс золотой банки
            food = { x: pos.x, y: pos.y, isGolden: isGolden };
        }
        
        function spawnBonus() {
            if (bonus && bonus.active) return;
            if (Math.random() > 0.02) return;
            const free = [];
            for (let i=0; i<GRID_SIZE; i++) for (let j=0; j<GRID_SIZE; j++) {
                let occ = false;
                for (let s of snake) if (s.x===i && s.y===j) { occ=true; break; }
                if (!occ && !(food.x===i && food.y===j)) free.push({x:i, y:j});
            }
            if (!free.length) return;
            const pos = free[Math.floor(Math.random()*free.length)];
            const type = Math.floor(Math.random()*4); // 0,1,2,3 (магнит под номером 3)
            bonus = { x:pos.x, y:pos.y, type:type, active:true, endTime:Date.now()+5000 };
        }
        
        function eatBonus(b) {
            bonusEatenThisGame++;
            playSound('bonus');
            if (b.type === 0) { // ускорение
                activeEffects.speedMult = 1.5;
                activeEffects.effectEndTime = Date.now()+5000;
                if (gameLoop) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs/activeEffects.speedMult); }
            } else if (b.type === 1) { // замедление
                activeEffects.speedMult = 0.7;
                activeEffects.effectEndTime = Date.now()+5000;
                if (gameLoop) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs/activeEffects.speedMult); }
            } else if (b.type === 2) { // удвоение очков
                activeEffects.scoreMult = 2;
                activeEffects.effectEndTime = Date.now()+5000;
            } else if (b.type === 3) { // магнит
                magnetActive = true;
                magnetEndTime = Date.now()+3000;
            }
            bonus = null;
        }
        
        function applyMagnet() {
            if (!magnetActive) return;
            // Притягиваем еду к голове
            let head = snake[0];
            let dx = food.x - head.x;
            let dy = food.y - head.y;
            if (Math.abs(dx) + Math.abs(dy) > 1) {
                if (dx !== 0) food.x += (dx > 0 ? -1 : 1);
                if (dy !== 0) food.y += (dy > 0 ? -1 : 1);
                // Не даём еде выйти за границы
                food.x = Math.min(GRID_SIZE-1, Math.max(0, food.x));
                food.y = Math.min(GRID_SIZE-1, Math.max(0, food.y));
                // Также проверяем, не оказалась ли еда на змейке
                for (let s of snake) {
                    if (s.x === food.x && s.y === food.y) {
                        // если пересеклась, перемещаем в ближайшую свободную клетку
                        generateRandomFood();
                        break;
                    }
                }
            }
        }
        
        function updateTrail() {
            trail.unshift({ x: snake[0].x, y: snake[0].y });
            if (trail.length > TRAIL_LENGTH) trail.pop();
        }
        
        function moveSnake() {
            if (!gameActive || paused) return;
            direction = nextDir;
            let newHead = {...snake[0]};
            switch(direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT': newHead.x--; break;
                case 'UP': newHead.y--; break;
                case 'DOWN': newHead.y++; break;
            }
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            if (bonus && bonus.active && newHead.x===bonus.x && newHead.y===bonus.y) { eatBonus(bonus); addParticles(bonus.x*CELL_SIZE, bonus.y*CELL_SIZE); }
            if (willEat) {
                snake.unshift(newHead);
                let addScore = 1;
                if (activeEffects.scoreMult > 1 && Date.now() < activeEffects.effectEndTime) addScore = 2;
                if (food.isGolden) addScore *= 3;
                // Комбо
                let now = Date.now();
                if (now - lastEatTime < COMBO_WINDOW) {
                    combo = Math.min(10, combo+1);
                } else {
                    combo = 1;
                }
                lastEatTime = now;
                addScore = addScore * combo;
                score += addScore;
                updateScoreUI();
                addParticles(food.x*CELL_SIZE, food.y*CELL_SIZE);
                playSound('eat');
                playSound('canopen');
                // Опыт и ежедневные задания
                addExp(1);
                updateDailyCollect(1);
                totalCollected++;
                localStorage.setItem('pepsiedTotalCollected', totalCollected);
                if (checkWin()) return;
                if (score % 5 === 0 && speedMs > 70) {
                    speedMs = Math.max(70, speedMs - speedInc);
                    if (!paused && gameActive) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs / (activeEffects.speedMult||1)); }
                }
                generateRandomFood();
                turnCounter = 0;
            } else {
                if (direction !== nextDir) turnCounter++;
                else turnCounter = 0;
                if (turnCounter >= 5 && !achievements.acrobat) { achievements.acrobat=true; saveAchievements(); addCoins(20); }
                snake.unshift(newHead);
                snake.pop();
            }
            // Магнит
            applyMagnet();
            if (magnetActive && Date.now() > magnetEndTime) magnetActive = false;
            // Тень
            updateTrail();
            if (!bonus || !bonus.active) spawnBonus();
            if (bonus && bonus.active && Date.now() > bonus.endTime) { bonus.active=false; bonus=null; }
            if (activeEffects.effectEndTime && Date.now() > activeEffects.effectEndTime) {
                activeEffects.speedMult=1; activeEffects.scoreMult=1;
                if (!paused && gameActive) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs); }
            }
            const head = snake[0];
            if (head.x<0 || head.x>=GRID_SIZE || head.y<0 || head.y>=GRID_SIZE) { gameOver(); return; }
            for (let i=1; i<snake.length; i++) if (snake[i].x===head.x && snake[i].y===head.y) { gameOver(); return; }
            draw();
        }
        
        function gameTick() { moveSnake(); updateParticles(); }
        
        function checkWin() {
            if (!isEndless && score>=winScore) {
                gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
                updatePersonalBest(score);
                if (!achievements.firstWin) { achievements.firstWin=true; saveAchievements(); addCoins(30); }
                updateDailyTime(Math.floor((Date.now()-gameStartTime)/1000));
                playSound('win');
                window.location.replace('win.html');
                return true;
            }
            if (isEndless && score>=100 && !achievements.endless100) {
                achievements.endless100=true; saveAchievements(); addCoins(20);
            }
            return false;
        }
        
        function gameOver() {
            if (isThreeLives && lives>0) {
                lives--;
                updateLivesDisplay();
                if (lives===0) {
                    gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
                    updatePersonalBest(score);
                    playSound('death');
                    window.location.replace('gameover.html');
                } else {
                    playSound('death');
                    // сброс змейки
                    let startLength = 3 + startLengthBonus;
                    snake = [];
                    for (let i=0; i<startLength; i++) snake.push({ x: 10 - i, y: 10 });
                    direction='RIGHT'; nextDir='RIGHT';
                    gameActive=true; speedMs=Math.max(70, baseSpeed - Math.floor(score/5)*speedInc);
                    activeEffects={speedMult:1,scoreMult:1,effectEndTime:0};
                    magnetActive=false;
                    bonus=null;
                    generateRandomFood();
                    if(gameLoop)clearInterval(gameLoop);
                    gameLoop=setInterval(gameTick, speedMs);
                    draw();
                }
                return;
            } else {
                gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
                updatePersonalBest(score);
                updateDailyTime(Math.floor((Date.now()-gameStartTime)/1000));
                playSound('death');
                window.location.replace('gameover.html');
            }
        }
        
        function updatePersonalBest(scr) {
            if (scr > personalBest) {
                personalBest = scr;
                localStorage.setItem('pepsiedPersonalBest', personalBest);
                document.getElementById('recordValue').innerText = personalBest;
                addCoins(5);
                // оповещение рекорда (просто звук)
                playSound('win');
                // в будущем можно добавить голосовое "New record!"
            }
        }
        
        function addCoins(amount) {
            coins += amount;
            localStorage.setItem('pepsiedCoins', coins);
        }
        
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('comboDisplay').innerHTML = `x${combo}`;
        }
        
        function updateLivesDisplay() {
            if (isThreeLives) {
                let hearts = '';
                for (let i=0; i<lives; i++) hearts += '❤️';
                for (let i=lives; i<3; i++) hearts += '🖤';
                document.getElementById('livesPanel').innerHTML = hearts;
                document.getElementById('livesPanel').style.display = 'flex';
            } else {
                document.getElementById('livesPanel').style.display = 'none';
            }
        }
        
        // Анимация частиц
        function addParticles(x,y) {
            for (let i=0;i<8;i++) particles.push({ x:x+CELL_SIZE/2, y:y+CELL_SIZE/2, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:20 });
        }
        function updateParticles() {
            for (let i=0; i<particles.length; i++) {
                particles[i].x+=particles[i].vx; particles[i].y+=particles[i].vy;
                particles[i].life--;
                if (particles[i].life<=0) { particles.splice(i,1); i--; }
            }
        }
        function drawParticles() {
            for (let p of particles) {
                ctx.fillStyle = `rgba(255,200,100,${p.life/20})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            }
        }
        
        function draw() {
            // Фон
            if (grassLoaded && grass.complete && grass.naturalWidth>0) {
                ctx.drawImage(grass,0,0,canvas.width,canvas.height);
            } else {
                ctx.fillStyle = darkMode ? "#000" : "#2d1f3a";
                ctx.fillRect(0,0,canvas.width,canvas.height);
            }
            // Тень (след хвоста)
            if (!darkMode) {
                for (let i=0; i<trail.length; i++) {
                    let pos = trail[i];
                    if (!pos) continue;
                    ctx.fillStyle = `rgba(100,100,200,${0.3 - i*0.03})`;
                    ctx.fillRect(pos.x*CELL_SIZE, pos.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
            // Сетка (только если не тёмный режим)
            if (!darkMode) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
                for (let i=0;i<=GRID_SIZE;i++) {
                    ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(canvas.width,i*CELL_SIZE); ctx.stroke();
                }
            }
            // Еда
            if (food.isGolden) {
                ctx.fillStyle = "#FFD700";
                ctx.shadowBlur = 10;
            } else {
                ctx.fillStyle = "#E31837";
            }
            ctx.beginPath(); ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = `bold ${CELL_SIZE*0.5}px monospace`;
            ctx.fillText(food.isGolden ? "⭐" : "P", food.x*CELL_SIZE+CELL_SIZE*0.35, food.y*CELL_SIZE+CELL_SIZE*0.7);
            ctx.shadowBlur = 0;
            // Бонус
            if (bonus && bonus.active) {
                let color = bonus.type===0?"#00ffaa":(bonus.type===1?"#66ccff":(bonus.type===2?"#ffcc44":"#aa44ff"));
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(bonus.x*CELL_SIZE+CELL_SIZE/2, bonus.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.3,0,2*Math.PI); ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = `bold ${CELL_SIZE*0.5}px monospace`;
                let txt = bonus.type===0?"⚡":(bonus.type===1?"🐢":(bonus.type===2?"2x":"🧲"));
                ctx.fillText(txt, bonus.x*CELL_SIZE+CELL_SIZE*0.35, bonus.y*CELL_SIZE+CELL_SIZE*0.7);
            }
            // Змейка
            for (let i=0; i<snake.length; i++) {
                const s = snake[i];
                const x = s.x*CELL_SIZE, y = s.y*CELL_SIZE;
                const isHead = (i===0);
                if (isHead && headLoaded && headImage.complete) {
                    ctx.drawImage(headImage, x, y, CELL_SIZE, CELL_SIZE);
                } else {
                    // Хвост – отображаем иконку из tailIcons
                    let tailIcon = tailIcons[tailIdx] || "🥤";
                    ctx.font = `${CELL_SIZE*0.7}px "Segoe UI Emoji"`;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillText(tailIcon, x+CELL_SIZE*0.15, y+CELL_SIZE*0.8);
                    if (!darkMode) {
                        ctx.fillStyle = "#6a3e9a";
                        ctx.beginPath(); ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, CELL_SIZE*0.3, 0, 2*Math.PI); ctx.fill();
                    }
                }
            }
            drawParticles();
            if (paused) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font = "bold 30px system-ui"; ctx.fillStyle = "white";
                ctx.fillText("ПАУЗА", canvas.width/2-70, canvas.height/2);
            }
        }
        
        // Управление
        function changeDirection(newDir) {
            if (!gameActive || paused) return;
            const opp = {'UP':'DOWN','DOWN':'UP','LEFT':'RIGHT','RIGHT':'LEFT'};
            if (opp[newDir] !== direction) nextDir = newDir;
        }
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') changeDirection('UP');
            else if (e.key === 'ArrowDown') changeDirection('DOWN');
            else if (e.key === 'ArrowLeft') changeDirection('LEFT');
            else if (e.key === 'ArrowRight') changeDirection('RIGHT');
            else if (e.key === 'c' && e.ctrlKey) {
                // секретные коды (можно ввести в консоль, но и через ctrl+C?)
            }
        });
        document.querySelectorAll('.dir-btn').forEach(btn => {
            const dir = btn.dataset.dir;
            btn.addEventListener('click', () => changeDirection(dir));
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(dir); });
        });
        
        // Пауза
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            if (!gameActive) return;
            paused = !paused;
            if(paused) { if(gameLoop)clearInterval(gameLoop); gameLoop=null; pauseBtn.innerText='▶️'; }
            else { gameLoop = setInterval(gameTick, speedMs/(activeEffects.speedMult||1)); pauseBtn.innerText='⏸️'; }
            draw();
        });
        
        // Достижения (загружаем из localStorage)
        let achievements = {
            firstWin: false, fiftyCollected: false, speedDemon: false, skinChanger: false, bonusMaster: false,
            masterDifficulty: false, acrobat: false, endless100: false, threeLivesPerfect: false
        };
        const savedAchievements = localStorage.getItem('pepsiedAchievements');
        if (savedAchievements) { try { achievements = JSON.parse(savedAchievements); } catch(e) {} }
        function saveAchievements() { localStorage.setItem('pepsiedAchievements', JSON.stringify(achievements)); }
        
        document.getElementById('restartGameBtn').addEventListener('click', () => { if(gameLoop)clearInterval(gameLoop); initGame(); });
        document.getElementById('backToMenuBtn').addEventListener('click', () => window.location.href='index.html');
        
        // Секретные коды (через консоль)
        window.cheat = function(code) {
            if (code === 'pepsigold') { coins += 100; localStorage.setItem('pepsiedCoins', coins); alert('+100 монет!'); playSound('bonus'); }
            else if (code === 'darkmode') { darkMode = !darkMode; document.body.classList.toggle('dark-mode', darkMode); localStorage.setItem('pepsiedDarkMode', darkMode); draw(); }
            else alert('Неизвестный код');
        };
        
        initGame();
    })();
</script>
</body>
</html>

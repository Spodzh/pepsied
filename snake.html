<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пепсиед — Фиолетовая змейка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            user-select: none;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #1a0b2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Montserrat', system-ui, -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 650px;
        }

        .game-wrapper {
            background: #2c1a48;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            border: 1px solid #a55eff;
            width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #a55eff, 0 10px 25px black;
            width: 100%;
            height: auto;
            background: #2d1f3a;
            cursor: pointer;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 10px 0 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .score-panel {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.5rem;
            color: #e9c8ff;
            letter-spacing: 2px;
            border: 1px solid #b77eff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-icon {
            width: 28px;
            height: 28px;
            display: inline-block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .restart-btn, .back-to-menu {
            background: #5f2e9e;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .restart-btn:active, .back-to-menu:active {
            transform: scale(0.97);
            background: #7f4ac7;
        }

        .status {
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #f0e6b2;
            border: 1px solid #b77eff;
            text-align: center;
        }

        .touch-controls {
            display: none;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            width: 100%;
        }
        .dir-btn {
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 60px;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 12px 0;
            width: 70px;
            text-align: center;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #0f0719;
            touch-action: manipulation;
            user-select: none;
        }
        .dir-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f0719;
            background: #5f2e9e;
        }

        @media (max-width: 768px) {
            .touch-controls {
                display: flex;
            }
            body {
                padding: 12px;
            }
            .game-wrapper {
                padding: 15px;
            }
            .score-panel {
                font-size: 1.2rem;
                padding: 5px 12px;
            }
            .restart-btn, .back-to-menu {
                font-size: 0.75rem;
                padding: 6px 14px;
            }
            .status {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .dir-btn {
                width: 60px;
                font-size: 1.8rem;
                padding: 10px 0;
            }
        }

        @media (max-width: 480px) {
            .dir-btn {
                width: 55px;
                font-size: 1.6rem;
                padding: 8px 0;
            }
            .touch-controls {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-wrapper">
        <canvas id="snakeCanvas" width="600" height="600"></canvas>
        <div class="info-bar">
            <div class="score-panel">
                <div id="scoreIcon" class="score-icon"></div>
                <span id="scoreValue">0</span>
            </div>
            <div class="status" id="gameStatus">🐍 Игра активна</div>
            <button class="restart-btn" id="restartGameBtn">🔄 Заново</button>
            <button class="back-to-menu" id="backToMenuBtn">🏠 В меню</button>
        </div>
    </div>
    <div class="touch-controls">
        <button class="dir-btn" data-dir="UP">▲</button>
        <button class="dir-btn" data-dir="LEFT">◀</button>
        <button class="dir-btn" data-dir="DOWN">▼</button>
        <button class="dir-btn" data-dir="RIGHT">▶</button>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameStatusDiv = document.getElementById('gameStatus');

        // Иконка счёта
        const scoreIconElement = document.getElementById('scoreIcon');
        const scoreIconImg = new Image();
        scoreIconImg.src = "https://mir-s3-cdn-cf.behance.net/project_modules/1400/0e0066214215461.6753e7b69faf5.png";
        scoreIconImg.onload = () => {
            scoreIconElement.style.backgroundImage = `url('${scoreIconImg.src}')`;
            scoreIconElement.style.backgroundSize = 'contain';
        };
        scoreIconImg.onerror = () => {
            scoreIconElement.innerText = '🍕';
            scoreIconElement.style.fontSize = '1.4rem';
            scoreIconElement.style.backgroundImage = 'none';
        };

        // Фиксированный размер поля 20x20, размер клетки 30px (canvas 600x600)
        const GRID_SIZE = 20;
        const CELL_SIZE = 30; // 600/20

        // Убедимся, что canvas всегда 600x600 (логически)
        canvas.width = 600;
        canvas.height = 600;

        // Загружаем картинки, но с fallback-отрисовкой
        const backgroundImage = new Image();
        backgroundImage.src = "https://as2.ftcdn.net/jpg/03/18/48/95/1000_F_318489561_qpVjxV7GEF4btKaiD4OWe78vX737Jnzz.jpg";
        let backgroundLoaded = false;
        backgroundImage.onload = () => { backgroundLoaded = true; draw(); };
        backgroundImage.onerror = () => { backgroundLoaded = false; };

        const foodImage = new Image();
        foodImage.src = "https://i.pinimg.com/474x/fd/f9/de/fdf9de1262b8ad9522b6ff90b772f46f.jpg?nii=t";
        let foodImageLoaded = false;
        foodImage.onload = () => { foodImageLoaded = true; draw(); };
        foodImage.onerror = () => { foodImageLoaded = false; };

        const headImage = new Image();
        headImage.src = "https://i.ibb.co/pBkq71nP/412421.png";
        let headImageLoaded = false;
        headImage.onload = () => { headImageLoaded = true; draw(); };
        headImage.onerror = () => { headImageLoaded = false; };

        const tailImage = new Image();
        tailImage.src = "https://cdn-icons-png.flaticon.com/512/732/732064.png";
        let tailImageLoaded = false;
        tailImage.onload = () => { tailImageLoaded = true; draw(); };
        tailImage.onerror = () => { tailImageLoaded = false; };

        // Игровые переменные
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameLoop = null;
        let gameActive = true;
        let speedMs = 150;
        let baseSpeed = 150;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            updateScoreUI();
            gameActive = true;
            speedMs = baseSpeed;
            gameStatusDiv.innerText = '🐍 Игра активна';
            generateRandomFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, speedMs);
            draw();
        }

        function generateRandomFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if (snake.length >= totalCells) {
                gameActive = false;
                gameStatusDiv.innerText = '🏆 ПОБЕДА! Ты накормил Донится! 🏆';
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = null;
                draw();
                return;
            }
            const freeCells = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    let occupied = false;
                    for (let s of snake) {
                        if (s.x === i && s.y === j) { occupied = true; break; }
                    }
                    if (!occupied) freeCells.push({ x: i, y: j });
                }
            }
            if (freeCells.length === 0) {
                gameActive = false;
                gameStatusDiv.innerText = '🏆 ПОБЕДА! Вся карта в пепси! 🏆';
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = null;
                draw();
                return;
            }
            const rand = Math.floor(Math.random() * freeCells.length);
            food = freeCells[rand];
        }

        function updateScoreUI() {
            scoreSpan.innerText = score;
        }

        function moveSnake() {
            if (!gameActive) return;
            direction = nextDirection;
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            if (willEat) {
                snake.unshift(newHead);
                score++;
                updateScoreUI();
                if (score % 5 === 0 && speedMs > 70) {
                    speedMs = Math.max(70, speedMs - 7);
                    resetGameInterval();
                }
                generateRandomFood();
            } else {
                snake.unshift(newHead);
                snake.pop();
            }
            const head = snake[0];
            // Стены
           if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
    gameActive = false; if (gameLoop) clearInterval(gameLoop); gameLoop = null;
    window.location.href = 'gameover.html'; return;
}
            // Столкновение с собой
           for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
        gameActive = false; if (gameLoop) clearInterval(gameLoop); gameLoop = null;
        window.location.href = 'gameover.html'; return;
    }
}
            if (!gameActive) {
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = null;
            }
            draw();
        }

        function resetGameInterval() {
            if (gameLoop) {
                clearInterval(gameLoop);
                if (gameActive) gameLoop = setInterval(gameTick, speedMs);
            }
        }

        function gameTick() {
            if (!gameActive) return;
            moveSnake();
        }

        // Рисуем всё самостоятельно, с запасными вариантами
        function draw() {
            // 1. Фон
            if (backgroundLoaded && backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            } else {
                // Запасной градиент
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, "#2d1f3a");
                grad.addColorStop(1, "#1a0b2e");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. Белая сетка
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 3. Еда
            if (foodImageLoaded && foodImage.complete && foodImage.naturalWidth > 0) {
                ctx.drawImage(foodImage, food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            } else {
                ctx.fillStyle = "#E31837";
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE*0.4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = `bold ${CELL_SIZE * 0.6}px monospace`;
                ctx.fillText("P", food.x * CELL_SIZE + CELL_SIZE*0.35, food.y * CELL_SIZE + CELL_SIZE*0.7);
            }

            // 4. Змейка
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const isHead = (i === 0);

                if (isHead && headImageLoaded && headImage.complete && headImage.naturalWidth > 0) {
                    ctx.drawImage(headImage, x, y, CELL_SIZE, CELL_SIZE);
                }
                else if (!isHead && tailImageLoaded && tailImage.complete && tailImage.naturalWidth > 0) {
                    ctx.drawImage(tailImage, x, y, CELL_SIZE, CELL_SIZE);
                }
                else {
                    // Запасной вариант: круг
                    const radius = CELL_SIZE * 0.4;
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, radius + 1, 0, Math.PI*2);
                    ctx.fillStyle = "#6a3e9a";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, radius, 0, Math.PI*2);
                    ctx.fillStyle = isHead ? "#bc7eff" : "#9a5fdf";
                    ctx.fill();
                    if (!isHead) {
                        ctx.fillStyle = "#e8d5ff";
                        ctx.font = `${CELL_SIZE * 0.55}px "Segoe UI Emoji"`;
                        ctx.fillText("🐍", x + CELL_SIZE/3, y + CELL_SIZE - 6);
                    }
                }
            }

            // 5. Победа
            if (gameActive && snake.length === GRID_SIZE * GRID_SIZE) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 28px system-ui";
                ctx.fillStyle = "#FFD966";
                ctx.fillText("✨ ПОБЕДА! Донится счастлива ✨", canvas.width/2 - 170, canvas.height/2);
            }
        }

        // Управление
        function changeDirection(newDir) {
            if (!gameActive) return;
            const opposite = { 'UP':'DOWN', 'DOWN':'UP', 'LEFT':'RIGHT', 'RIGHT':'LEFT' };
            if (opposite[newDir] !== direction) nextDirection = newDir;
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowUp') changeDirection('UP');
            else if (key === 'ArrowDown') changeDirection('DOWN');
            else if (key === 'ArrowLeft') changeDirection('LEFT');
            else if (key === 'ArrowRight') changeDirection('RIGHT');
            e.preventDefault();
        });

        document.querySelectorAll('.dir-btn').forEach(btn => {
            const dir = btn.getAttribute('data-dir');
            btn.addEventListener('click', () => changeDirection(dir));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                changeDirection(dir);
            });
        });

        document.getElementById('restartGameBtn').addEventListener('click', () => {
            if (gameLoop) clearInterval(gameLoop);
            initGame();
        });
        document.getElementById('restartGameBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameLoop) clearInterval(gameLoop);
            initGame();
        });

        document.getElementById('backToMenuBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        document.getElementById('backToMenuBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });

        initGame();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пепсиед — Змейка</title>
    <style>
        /* все стили такие же, как в предыдущей версии, включая плавающую кнопку и панель лидеров */
        * { margin:0; padding:0; user-select:none; box-sizing:border-box; touch-action:manipulation; }
        body { background:#1a0b2e; min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Segoe UI', 'Montserrat', system-ui; padding:16px; position:relative; }
        .leaderboard-btn { position:fixed; top:20px; right:20px; background:#2c1a48; border:2px solid #a55eff; border-radius:50px; width:55px; height:55px; font-size:1.8rem; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100; box-shadow:0 4px 12px black; backdrop-filter:blur(4px); }
        .leaderboard-btn:active { transform:scale(0.95); }
        .leaderboard-panel { position:fixed; top:0; right:-320px; width:280px; height:100%; background:rgba(20,10,40,0.95); backdrop-filter:blur(16px); border-left:2px solid #a55eff; z-index:200; transition:right 0.3s ease; padding:20px; display:flex; flex-direction:column; color:white; font-family:monospace; }
        .leaderboard-panel.open { right:0; }
        .leaderboard-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:1.5rem; font-weight:bold; border-bottom:2px solid #a55eff; padding-bottom:10px; }
        .close-leaderboard { background:none; border:none; color:white; font-size:1.8rem; cursor:pointer; }
        .leaderboard-list { flex:1; overflow-y:auto; }
        .leaderboard-item { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #a55eff66; font-size:1.1rem; }
        .leaderboard-name { font-weight:bold; }
        .leaderboard-score { color:#ffd966; }
        .empty-leaderboard { text-align:center; color:#aaa; margin-top:30px; }
        .game-container { display:flex; flex-direction:column; align-items:center; width:100%; max-width:650px; }
        .game-wrapper { background:#2c1a48; border-radius:48px; padding:20px; box-shadow:0 25px 40px rgba(0,0,0,0.6); border:1px solid #a55eff; width:100%; }
        canvas { display:block; margin:0 auto; border-radius:24px; box-shadow:0 0 0 3px #a55eff, 0 10px 25px black; width:100%; height:auto; background:#2d1f3a; }
        .info-bar { display:flex; justify-content:space-between; align-items:center; margin:20px 10px 0; gap:10px; flex-wrap:wrap; }
        .score-panel { background:#000000aa; backdrop-filter:blur(4px); padding:8px 18px; border-radius:50px; font-weight:bold; font-family:monospace; font-size:1.5rem; color:#e9c8ff; border:1px solid #b77eff; display:flex; align-items:center; gap:8px; }
        .score-icon { width:28px; height:28px; display:inline-block; background-size:contain; background-repeat:no-repeat; background-position:center; }
        .record-panel { background:#000000aa; backdrop-filter:blur(4px); padding:8px 18px; border-radius:50px; font-size:1.2rem; color:#ffd966; border:1px solid #b77eff; display:flex; align-items:center; gap:6px; }
        .restart-btn, .back-to-menu, .music-toggle { background:#5f2e9e; border:none; color:white; font-weight:bold; font-size:0.9rem; padding:8px 18px; border-radius:40px; cursor:pointer; font-family:inherit; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
        .restart-btn:active, .back-to-menu:active, .music-toggle:active { transform:scale(0.97); }
        .status { background:#000000aa; padding:6px 16px; border-radius:32px; font-size:0.85rem; font-weight:500; color:#f0e6b2; border:1px solid #b77eff; text-align:center; }
        .touch-controls { display:none; justify-content:center; margin-top:30px; width:100%; }
        .dpad { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; background:rgba(0,0,0,0.3); padding:20px; border-radius:80px; backdrop-filter:blur(4px); width:280px; justify-items:center; align-items:center; }
        .dir-btn { background:#2c1a48; border:2px solid #a55eff; border-radius:60px; color:white; font-size:2.4rem; width:80px; height:80px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 0 #0f0719; }
        .dir-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #0f0719; background:#7f4ac7; }
        @media (max-width:768px) { .touch-controls { display:flex; } .leaderboard-btn { width:45px; height:45px; font-size:1.5rem; top:10px; right:10px; } .leaderboard-panel { width:260px; } .dir-btn { width:65px; height:65px; font-size:1.8rem; } .dpad { width:240px; gap:8px; padding:15px; } }
    </style>
</head>
<body>
    <!-- Кнопка лидеров -->
    <div class="leaderboard-btn" id="leaderboardBtn">🏆</div>
    <div class="leaderboard-panel" id="leaderboardPanel">
        <div class="leaderboard-header">
            <span>🏆 ТАБЛИЦА ЛИДЕРОВ 🏆</span>
            <button class="close-leaderboard" id="closeLeaderboardBtn">✖</button>
        </div>
        <div class="leaderboard-list" id="leaderboardList">
            <div class="empty-leaderboard">Загрузка...</div>
        </div>
    </div>

    <div class="game-container">
        <div class="game-wrapper">
            <canvas id="snakeCanvas" width="600" height="600"></canvas>
            <div class="info-bar">
                <div class="score-panel"><div id="scoreIcon" class="score-icon"></div><span id="scoreValue">0</span></div>
                <div class="record-panel"><span>🏅 Рекорд:</span><span id="recordValue">0</span></div>
                <div class="status" id="gameStatus">🐍 Игра активна</div>
                <button class="restart-btn" id="restartGameBtn">🔄 Заново</button>
                <button class="back-to-menu" id="backToMenuBtn">🏠 В меню</button>
                <button class="music-toggle" id="musicToggleBtn">🔊 Музыка</button>
            </div>
        </div>
        <div class="touch-controls">
            <div class="dpad">
                <div></div><button class="dir-btn" data-dir="UP">▲</button><div></div>
                <button class="dir-btn" data-dir="LEFT">◀</button>
                <button class="dir-btn" data-dir="DOWN">▼</button>
                <button class="dir-btn" data-dir="RIGHT">▶</button>
                <div></div><div></div><div></div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

<script>
    (function(){
        // Получаем имя из localStorage
        let playerName = localStorage.getItem('pepsiedPlayerName');
        if (!playerName) {
            // Если вдруг имени нет (пользователь зашёл напрямую), перенаправляем на главную
            window.location.href = 'index.html';
            return;
        }

        // --- Таблица лидеров ---
        let leaderboard = [];
        function loadLeaderboard() {
            const stored = localStorage.getItem('pepsiedLeaderboard');
            leaderboard = stored ? JSON.parse(stored) : [];
            renderLeaderboard();
        }
        function saveLeaderboard() { localStorage.setItem('pepsiedLeaderboard', JSON.stringify(leaderboard)); }
        function renderLeaderboard() {
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            if (leaderboard.length === 0) { container.innerHTML = '<div class="empty-leaderboard">Пока нет рекордов</div>'; return; }
            const sorted = [...leaderboard].sort((a,b)=>b.score-a.score).slice(0,5);
            container.innerHTML = sorted.map(e => `<div class="leaderboard-item"><span class="leaderboard-name">${escapeHtml(e.name)}</span><span class="leaderboard-score">${e.score} 🍕</span></div>`).join('');
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
        function updateLeaderboard(score) {
            if (!playerName) return;
            const existing = leaderboard.find(e => e.name === playerName);
            if (existing) { if (score > existing.score) existing.score = score; else return; }
            else { leaderboard.push({ name: playerName, score: score }); }
            saveLeaderboard();
            renderLeaderboard();
        }

        // Панель лидеров
        const leaderboardBtn = document.getElementById('leaderboardBtn');
        const leaderboardPanel = document.getElementById('leaderboardPanel');
        const closeLeaderboardBtn = document.getElementById('closeLeaderboardBtn');
        function openLeaderboard() { leaderboardPanel.classList.add('open'); }
        function closeLeaderboard() { leaderboardPanel.classList.remove('open'); }
        leaderboardBtn.addEventListener('click', openLeaderboard);
        closeLeaderboardBtn.addEventListener('click', closeLeaderboard);
        document.addEventListener('click', (e) => {
            if (leaderboardPanel.classList.contains('open') && !leaderboardPanel.contains(e.target) && e.target !== leaderboardBtn) closeLeaderboard();
        });

        // Музыка
        const bgMusic = document.getElementById('bgMusic');
        const musicToggleBtn = document.getElementById('musicToggleBtn');
        let musicEnabled = localStorage.getItem('pepsiedMusic') !== 'false';
        function setMusic(enable) {
            if (enable) { bgMusic.play().catch(e=>console.log); musicToggleBtn.innerText = "🔊 Музыка"; }
            else { bgMusic.pause(); musicToggleBtn.innerText = "🔇 Музыка"; }
            localStorage.setItem('pepsiedMusic', enable);
        }
        musicToggleBtn.addEventListener('click', () => { musicEnabled = !musicEnabled; setMusic(musicEnabled); });
        if (musicEnabled) { setTimeout(()=>bgMusic.play().catch(e=>console.log), 500); } else { setMusic(false); }

        // Игровая логика
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const recordSpan = document.getElementById('recordValue');
        const gameStatusDiv = document.getElementById('gameStatus');
        const scoreIconElement = document.getElementById('scoreIcon');
        canvas.width = 600; canvas.height = 600;
        const GRID_SIZE = 20, CELL_SIZE = 30;

        let personalBest = parseInt(localStorage.getItem('pepsiedPersonalBest')) || 0;
        recordSpan.innerText = personalBest;
        function updatePersonalBest(score) { if(score>personalBest) { personalBest=score; localStorage.setItem('pepsiedPersonalBest',personalBest); recordSpan.innerText=personalBest; } }

        // Картинки
        const grassBackground = new Image(); grassBackground.src = "https://art.pixilart.com/6387674a5f8851d.png"; let grassLoaded=false; grassBackground.onload=()=>{grassLoaded=true; draw();};
        const scoreIconImg = new Image(); scoreIconImg.src="https://mir-s3-cdn-cf.behance.net/project_modules/1400/0e0066214215461.6753e7b69faf5.png"; scoreIconImg.onload=()=>{scoreIconElement.style.backgroundImage=`url('${scoreIconImg.src}')`; scoreIconElement.style.backgroundSize='contain';}; scoreIconImg.onerror=()=>{scoreIconElement.innerText='🍕';};
        const foodImage = new Image(); foodImage.src="https://i.pinimg.com/474x/fd/f9/de/fdf9de1262b8ad9522b6ff90b772f46f.jpg?nii=t"; let foodLoaded=false; foodImage.onload=()=>{foodLoaded=true; draw();};
        const headImage = new Image(); headImage.src="https://i.ibb.co/pBkq71nP/412421.png"; let headLoaded=false; headImage.onload=()=>{headLoaded=true; draw();};
        const tailImage = new Image(); tailImage.src="https://cdn-icons-png.flaticon.com/512/732/732064.png"; let tailLoaded=false; tailImage.onload=()=>{tailLoaded=true; draw();};

        let snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
        let food = {x:12,y:12};
        let direction='RIGHT', nextDir='RIGHT';
        let score=0, gameLoop=null, gameActive=true, speedMs=150;
        const WIN_SCORE = 25;

        function checkWin() {
            if(score>=WIN_SCORE) {
                gameActive=false; if(gameLoop) clearInterval(gameLoop); gameLoop=null;
                updatePersonalBest(score);
                if(playerName) updateLeaderboard(score);
                window.location.replace('win.html');
                return true;
            }
            return false;
        }
        function goToGameOver() {
            if(gameLoop) clearInterval(gameLoop); gameLoop=null;
            updatePersonalBest(score);
            if(playerName && score>0) updateLeaderboard(score);
            window.location.replace('gameover.html');
        }
        function initGame() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            direction='RIGHT'; nextDir='RIGHT';
            score=0; updateScoreUI();
            gameActive=true; speedMs=150;
            gameStatusDiv.innerText='🐍 Игра активна';
            generateRandomFood();
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameTick, speedMs);
            draw();
        }
        function generateRandomFood() {
            let free=[];
            for(let i=0;i<GRID_SIZE;i++) for(let j=0;j<GRID_SIZE;j++) { let occ=false; for(let s of snake) if(s.x===i && s.y===j){occ=true;break;} if(!occ) free.push({x:i,y:j}); }
            if(free.length===0) { gameActive=false; gameStatusDiv.innerText='🏆 ПОБЕДА!'; if(gameLoop) clearInterval(gameLoop); gameLoop=null; draw(); return; }
            food = free[Math.floor(Math.random()*free.length)];
        }
        function updateScoreUI() {
            scoreSpan.innerText=score;
            if(score>personalBest) { personalBest=score; localStorage.setItem('pepsiedPersonalBest',personalBest); recordSpan.innerText=personalBest; }
        }
        function moveSnake() {
            if(!gameActive) return;
            direction=nextDir;
            let newHead = {...snake[0]};
            switch(direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT': newHead.x--; break;
                case 'UP': newHead.y--; break;
                case 'DOWN': newHead.y++; break;
            }
            const willEat = (newHead.x===food.x && newHead.y===food.y);
            if(willEat) {
                snake.unshift(newHead);
                score++;
                updateScoreUI();
                if(checkWin()) return;
                if(score%5===0 && speedMs>70) { speedMs=Math.max(70,speedMs-7); clearInterval(gameLoop); gameLoop=setInterval(gameTick,speedMs); }
                generateRandomFood();
            } else {
                snake.unshift(newHead);
                snake.pop();
            }
            const head=snake[0];
            if(head.x<0 || head.x>=GRID_SIZE || head.y<0 || head.y>=GRID_SIZE) { gameActive=false; goToGameOver(); return; }
            for(let i=1;i<snake.length;i++) if(snake[i].x===head.x && snake[i].y===head.y) { gameActive=false; goToGameOver(); return; }
            draw();
        }
        function gameTick() { if(gameActive) moveSnake(); }
        function draw() {
            if(grassLoaded && grassBackground.complete && grassBackground.naturalWidth>0) ctx.drawImage(grassBackground,0,0,canvas.width,canvas.height);
            else { ctx.fillStyle="#2d1f3a"; ctx.fillRect(0,0,canvas.width,canvas.height); }
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
            for(let i=0;i<=GRID_SIZE;i++) { ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(canvas.width,i*CELL_SIZE); ctx.stroke(); }
            if(foodLoaded && foodImage.complete && foodImage.naturalWidth>0) ctx.drawImage(foodImage, food.x*CELL_SIZE, food.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
            else { ctx.fillStyle="#E31837"; ctx.beginPath(); ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.4,0,2*Math.PI); ctx.fill(); ctx.fillStyle="white"; ctx.font=`bold ${CELL_SIZE*0.6}px monospace`; ctx.fillText("P", food.x*CELL_SIZE+CELL_SIZE*0.35, food.y*CELL_SIZE+CELL_SIZE*0.7); }
            for(let i=0;i<snake.length;i++) {
                const s=snake[i]; const x=s.x*CELL_SIZE, y=s.y*CELL_SIZE;
                const isHead=(i===0);
                if(isHead && headLoaded && headImage.complete && headImage.naturalWidth>0) ctx.drawImage(headImage,x,y,CELL_SIZE,CELL_SIZE);
                else if(!isHead && tailLoaded && tailImage.complete && tailImage.naturalWidth>0) ctx.drawImage(tailImage,x,y,CELL_SIZE,CELL_SIZE);
                else { const r=CELL_SIZE*0.4; ctx.beginPath(); ctx.arc(x+CELL_SIZE/2,y+CELL_SIZE/2,r+1,0,2*Math.PI); ctx.fillStyle="#6a3e9a"; ctx.fill(); ctx.beginPath(); ctx.arc(x+CELL_SIZE/2,y+CELL_SIZE/2,r,0,2*Math.PI); ctx.fillStyle=isHead?"#bc7eff":"#9a5fdf"; ctx.fill(); if(!isHead) { ctx.fillStyle="#e8d5ff"; ctx.font=`${CELL_SIZE*0.55}px "Segoe UI Emoji"`; ctx.fillText("🐍", x+CELL_SIZE/3, y+CELL_SIZE-6); } }
            }
        }
        function changeDirection(newDir) {
            if(!gameActive) return;
            const opp={'UP':'DOWN','DOWN':'UP','LEFT':'RIGHT','RIGHT':'LEFT'};
            if(opp[newDir]!==direction) nextDir=newDir;
        }
        window.addEventListener('keydown',(e)=>{ const k=e.key; if(k==='ArrowUp') changeDirection('UP'); else if(k==='ArrowDown') changeDirection('DOWN'); else if(k==='ArrowLeft') changeDirection('LEFT'); else if(k==='ArrowRight') changeDirection('RIGHT'); e.preventDefault(); });
        document.querySelectorAll('.dir-btn').forEach(btn=>{ const dir=btn.dataset.dir; btn.addEventListener('click',(e)=>{e.preventDefault(); changeDirection(dir);}); btn.addEventListener('touchstart',(e)=>{e.preventDefault(); changeDirection(dir);}); });
        document.getElementById('restartGameBtn').addEventListener('click',()=>{if(gameLoop)clearInterval(gameLoop); initGame();});
        document.getElementById('restartGameBtn').addEventListener('touchstart',(e)=>{e.preventDefault(); if(gameLoop)clearInterval(gameLoop); initGame();});
        document.getElementById('backToMenuBtn').addEventListener('click',()=>window.location.href='index.html');
        document.getElementById('backToMenuBtn').addEventListener('touchstart',(e)=>{e.preventDefault(); window.location.href='index.html';});

        loadLeaderboard();
        initGame();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пепсиед — Змейка</title>
    <style>
        * { margin: 0; padding: 0; user-select: none; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #1a0b2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif;
            padding: 16px;
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 650px;
            position: relative;
            z-index: 2;
        }
        /* Анимированный фон (облака) */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.15);
            border-radius: 1000px;
            filter: blur(20px);
            animation: moveCloud linear infinite;
        }
        @keyframes moveCloud {
            0% { transform: translateX(-20%); }
            100% { transform: translateX(120%); }
        }
        .game-wrapper {
            background: #2c1a48cc;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            border: 1px solid #a55eff;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #a55eff, 0 10px 25px black;
            width: 100%;
            height: auto;
            background: #2d1f3a;
            cursor: pointer;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 10px 0;
            gap: 10px;
            flex-wrap: wrap;
        }
        .score-panel {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.5rem;
            color: #e9c8ff;
            border: 1px solid #b77eff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-icon { width: 28px; height: 28px; display: inline-block; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .record-panel {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 1.2rem;
            color: #ffd966;
            border: 1px solid #b77eff;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .lives-panel {
            background: #000000aa;
            padding: 5px 15px;
            border-radius: 50px;
            display: flex;
            gap: 5px;
            font-size: 1.3rem;
        }
        .restart-btn, .back-to-menu, .pause-btn, .sound-toggle {
            background: #5f2e9e;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .touch-controls {
            display: none;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
            transition: opacity 0.2s;
        }
        .dpad {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            width: 280px;
            justify-items: center;
            align-items: center;
        }
        .dir-btn {
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 60px;
            color: white;
            font-size: 2.4rem;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f0719;
        }
        .dir-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f0719;
            background: #7f4ac7;
        }
        @media (max-width: 768px) {
            .touch-controls { display: flex; }
            .dir-btn { width: 65px; height: 65px; font-size: 1.8rem; }
            .dpad { width: 240px; gap: 8px; padding: 15px; }
        }
    </style>
</head>
<body>
<div class="animated-bg" id="animatedBg"></div>
<div class="game-container">
    <div class="game-wrapper">
        <canvas id="snakeCanvas" width="600" height="600"></canvas>
        <div class="info-bar">
            <div class="score-panel"><div id="scoreIcon" class="score-icon"></div><span id="scoreValue">0</span></div>
            <div class="record-panel"><span>🏅 Рекорд:</span><span id="recordValue">0</span></div>
            <div id="livesPanel" class="lives-panel">❤️❤️❤️</div>
            <button class="pause-btn" id="pauseBtn">⏸️ Пауза</button>
            <button class="sound-toggle" id="soundToggleBtn">🔊 Звук</button>
            <button class="restart-btn" id="restartGameBtn">🔄 Заново</button>
            <button class="back-to-menu" id="backToMenuBtn">🏠 В меню</button>
        </div>
    </div>
    <div class="touch-controls" id="touchControls">
        <div class="dpad">
            <div></div><button class="dir-btn" data-dir="UP">▲</button><div></div>
            <button class="dir-btn" data-dir="LEFT">◀</button>
            <button class="dir-btn" data-dir="DOWN">▼</button>
            <button class="dir-btn" data-dir="RIGHT">▶</button>
            <div></div><div></div><div></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // -------------------- НАСТРОЙКИ ИЗ LOCALSTORAGE --------------------
        const touchEnabled = localStorage.getItem('pepsiedTouchEnabled') !== 'false';
        const volumePercent = localStorage.getItem('pepsiedVolume') ? parseInt(localStorage.getItem('pepsiedVolume')) : 70;
        let soundEnabled = localStorage.getItem('pepsiedSound') !== 'false';
        
        // Показываем/скрываем кнопки
        const touchControlsDiv = document.getElementById('touchControls');
        if (!touchEnabled) touchControlsDiv.style.display = 'none';
        
        // -------------------- ЗВУК (с громкостью) --------------------
        let audioCtx = null;
        function initAudio() { if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.2 * volumePercent / 100, now);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
            if (type === 'eat') { osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(440, now + 0.1); osc.type = 'sine'; }
            else if (type === 'bonus') { osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1); osc.type = 'triangle'; }
            else if (type === 'death') { osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.3); osc.type = 'sawtooth'; }
            else if (type === 'win') { osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2); osc.type = 'square'; }
            osc.start(); osc.stop(now + 0.3);
        }
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        soundToggleBtn.innerText = soundEnabled ? "🔊 Звук" : "🔇 Звук";
        soundToggleBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            localStorage.setItem('pepsiedSound', soundEnabled);
            soundToggleBtn.innerText = soundEnabled ? "🔊 Звук" : "🔇 Звук";
            if (soundEnabled && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });
        
        // -------------------- ЗАГРУЗКА СКИНОВ (ГОЛОВА И ХВОСТ) --------------------
        const headUrls = [
            "https://i.ibb.co/pBkq71nP/412421.png",
            "https://i.ibb.co/VW19FvXh/image.png",
            "https://i.ibb.co/JW06HZK3/image.png"
        ];
        const tailUrls = [
            "https://cdn-icons-png.flaticon.com/512/732/732064.png",
            "https://i.ibb.co/9pz7qTv/gold-tail.png",
            "https://i.ibb.co/2g3xYw7/fire-tail.png"
        ];
        let savedHead = localStorage.getItem('pepsiedHeadIndex');
        let headIdx = 0;
        if (savedHead !== null && !isNaN(parseInt(savedHead))) { let idx = parseInt(savedHead); if (idx >= 0 && idx < headUrls.length) headIdx = idx; }
        let savedTail = localStorage.getItem('pepsiedTailIndex');
        let tailIdx = 0;
        if (savedTail !== null && !isNaN(parseInt(savedTail))) { let idx = parseInt(savedTail); if (idx >= 0 && idx < tailUrls.length) tailIdx = idx; }
        
        const headImage = new Image(); headImage.src = headUrls[headIdx];
        const tailImage = new Image(); tailImage.src = tailUrls[tailIdx];
        let headLoaded = false, tailLoaded = false;
        headImage.onload = () => { headLoaded = true; draw(); };
        tailImage.onload = () => { tailLoaded = true; draw(); };
        
        // -------------------- ФОН (текстура травы + анимированные облака) --------------------
        const grass = new Image();
        grass.src = "https://art.pixilart.com/6387674a5f8851d.png";
        let grassLoaded = false;
        grass.onload = () => { grassLoaded = true; draw(); };
        
        // Генерация облаков
        const bgDiv = document.getElementById('animatedBg');
        for (let i = 0; i < 8; i++) {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            const size = 80 + Math.random() * 150;
            cloud.style.width = size + 'px';
            cloud.style.height = size * 0.6 + 'px';
            cloud.style.top = Math.random() * 100 + '%';
            cloud.style.left = Math.random() * 100 + '%';
            cloud.style.animationDuration = 20 + Math.random() * 30 + 's';
            cloud.style.animationDelay = Math.random() * 20 + 's';
            bgDiv.appendChild(cloud);
        }
        
        // -------------------- ИГРОВЫЕ ПАРАМЕТРЫ --------------------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const recordSpan = document.getElementById('recordValue');
        const livesPanelDiv = document.getElementById('livesPanel');
        canvas.width = 600; canvas.height = 600;
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        
        let personalBest = localStorage.getItem('pepsiedPersonalBest') ? parseInt(localStorage.getItem('pepsiedPersonalBest')) : 0;
        recordSpan.innerText = personalBest;
        function updatePersonalBest(score) {
            if (score > personalBest) {
                personalBest = score;
                localStorage.setItem('pepsiedPersonalBest', personalBest);
                recordSpan.innerText = personalBest;
                addCoins(5);
            }
        }
        
        // Монеты и статистика
        let coins = localStorage.getItem('pepsiedCoins') ? parseInt(localStorage.getItem('pepsiedCoins')) : 0;
        let totalCollected = localStorage.getItem('pepsiedTotalCollected') ? parseInt(localStorage.getItem('pepsiedTotalCollected')) : 0;
        let stats = { gamesPlayed: 0, wins: 0, deaths: 0, totalBonusesEaten: 0, totalCoinsEarned: 0 };
        const savedStats = localStorage.getItem('pepsiedStats');
        if (savedStats) { try { stats = JSON.parse(savedStats); } catch(e) {} }
        function saveStats() { localStorage.setItem('pepsiedStats', JSON.stringify(stats)); }
        function addCoins(amount) { coins += amount; localStorage.setItem('pepsiedCoins', coins); stats.totalCoinsEarned += amount; saveStats(); }
        function updateTotalCollected(amount) { totalCollected += amount; localStorage.setItem('pepsiedTotalCollected', totalCollected); }
        
        // Достижения (новые)
        let achievements = {
            firstWin: false, fiftyCollected: false, speedDemon: false, skinChanger: false, bonusMaster: false,
            masterDifficulty: false, acrobat: false, endless100: false, threeLivesPerfect: false
        };
        const savedAchievements = localStorage.getItem('pepsiedAchievements');
        if (savedAchievements) { try { achievements = JSON.parse(savedAchievements); } catch(e) {} }
        function saveAchievements() { localStorage.setItem('pepsiedAchievements', JSON.stringify(achievements)); }
        
        // Настройки игры
        const difficulty = localStorage.getItem('pepsiedDifficulty') || "normal";
        let baseSpeed = 150, speedInc = 7;
        if (difficulty === 'easy') { baseSpeed = 180; speedInc = 5; }
        else if (difficulty === 'hard') { baseSpeed = 120; speedInc = 10; }
        
        const gameMode = localStorage.getItem('pepsiedGameMode') || "classic";
        const isEndless = (gameMode === 'endless');
        const isThreeLives = (gameMode === '3lives');
        
        let snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
        let food = {x:12,y:12};
        let direction = 'RIGHT', nextDir = 'RIGHT';
        let score = 0, gameLoop = null, gameActive = true, speedMs = baseSpeed;
        let lives = 3;
        let winScore = isEndless ? Infinity : 25;
        let bonus = null;
        let activeEffects = { speedMult: 1, scoreMult: 1, effectEndTime: 0 };
        let bonusEatenThisGame = 0;
        let particles = [];
        let paused = false;
        let turnCounter = 0; // для достижения акробат
        let lastTurnScore = 0;
        
        function updateLivesDisplay() {
            if (isThreeLives) {
                let hearts = ''; for (let i=0; i<lives; i++) hearts += '❤️'; for (let i=lives; i<3; i++) hearts += '🖤';
                livesPanelDiv.innerHTML = hearts;
                livesPanelDiv.style.display = 'flex';
            } else { livesPanelDiv.style.display = 'none'; }
        }
        updateLivesDisplay();
        
        function spawnBonus() {
            if (bonus && bonus.active) return;
            if (Math.random() > 0.02) return;
            const free = [];
            for (let i=0; i<GRID_SIZE; i++) for (let j=0; j<GRID_SIZE; j++) {
                let occ = false;
                for (let s of snake) if (s.x===i && s.y===j) { occ=true; break; }
                if (!occ && !(food.x===i && food.y===j)) free.push({x:i,y:j});
            }
            if (!free.length) return;
            const pos = free[Math.floor(Math.random()*free.length)];
            const type = Math.floor(Math.random()*3);
            bonus = { x:pos.x, y:pos.y, type, active:true, endTime:Date.now()+5000 };
        }
        
        function eatBonus(b) {
            bonusEatenThisGame++;
            stats.totalBonusesEaten++;
            saveStats();
            if (!achievements.bonusMaster && bonusEatenThisGame>=3) { achievements.bonusMaster=true; saveAchievements(); addCoins(15); }
            playSound('bonus');
            if (b.type===0) { activeEffects.speedMult=1.5; activeEffects.effectEndTime=Date.now()+5000; if(gameLoop){clearInterval(gameLoop); gameLoop=setInterval(gameTick, speedMs/activeEffects.speedMult);} }
            else if (b.type===1) { activeEffects.speedMult=0.7; activeEffects.effectEndTime=Date.now()+5000; if(gameLoop){clearInterval(gameLoop); gameLoop=setInterval(gameTick, speedMs/activeEffects.speedMult);} }
            else { activeEffects.scoreMult=2; activeEffects.effectEndTime=Date.now()+5000; }
            bonus=null;
        }
        
        function addParticles(x,y) {
            for (let i=0;i<8;i++) particles.push({ x:x+CELL_SIZE/2, y:y+CELL_SIZE/2, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:20 });
        }
        function updateParticles() { for (let i=0; i<particles.length; i++) { particles[i].x+=particles[i].vx; particles[i].y+=particles[i].vy; particles[i].life--; if (particles[i].life<=0) { particles.splice(i,1); i--; } } }
        function drawParticles() { for (let p of particles) { ctx.fillStyle = `rgba(255,200,100,${p.life/20})`; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); } }
        
        function generateRandomFood() {
            const free = [];
            for (let i=0; i<GRID_SIZE; i++) for (let j=0; j<GRID_SIZE; j++) {
                let occ = false;
                for (let s of snake) if (s.x===i && s.y===j) { occ=true; break; }
                if (!occ && (!bonus || !(bonus.x===i && bonus.y===j))) free.push({x:i,y:j});
            }
            if (!free.length) { gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null; draw(); return; }
            food = free[Math.floor(Math.random()*free.length)];
        }
        
        function checkWin() {
            if (!isEndless && score>=winScore) {
                gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
                updatePersonalBest(score); updateTotalCollected(score);
                if (!achievements.firstWin) { achievements.firstWin=true; saveAchievements(); addCoins(30); }
                stats.wins++; saveStats();
                playSound('win');
                window.location.replace('win.html');
                return true;
            }
            if (isEndless && score>=100 && !achievements.endless100) {
                achievements.endless100=true; saveAchievements(); addCoins(20);
            }
            return false;
        }
        
        function gameOver() {
            if (isThreeLives && lives>0) {
                lives--;
                updateLivesDisplay();
                if (lives===0) {
                    gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
                    updatePersonalBest(score); updateTotalCollected(score);
                    stats.deaths++; saveStats();
                    playSound('death');
                    window.location.replace('gameover.html');
                } else {
                    playSound('death');
                    // сброс змейки
                    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
                    direction='RIGHT'; nextDir='RIGHT';
                    gameActive=true; speedMs=Math.max(70, baseSpeed - Math.floor(score/5)*speedInc);
                    activeEffects={speedMult:1,scoreMult:1,effectEndTime:0};
                    bonus=null;
                    generateRandomFood();
                    if(gameLoop)clearInterval(gameLoop);
                    gameLoop=setInterval(gameTick, speedMs);
                    draw();
                }
                return;
            } else {
                gameActive=false; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
                updatePersonalBest(score); updateTotalCollected(score);
                stats.deaths++; saveStats();
                playSound('death');
                window.location.replace('gameover.html');
            }
        }
        
        function initGame() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            direction='RIGHT'; nextDir='RIGHT';
            score=0; updateScoreUI();
            gameActive=true; speedMs=baseSpeed;
            activeEffects={speedMult:1,scoreMult:1,effectEndTime:0};
            bonusEatenThisGame=0; bonus=null; particles=[];
            paused=false; turnCounter=0;
            if (isThreeLives) lives=3;
            updateLivesDisplay();
            generateRandomFood();
            if(gameLoop)clearInterval(gameLoop);
            gameLoop=setInterval(gameTick, speedMs);
            draw();
            stats.gamesPlayed++; saveStats();
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
            if (score>personalBest) { personalBest=score; localStorage.setItem('pepsiedPersonalBest',personalBest); recordSpan.innerText=personalBest; addCoins(5); }
            if (!achievements.speedDemon && speedMs<=80 && score>=15) { achievements.speedDemon=true; saveAchievements(); addCoins(15); }
            if (!achievements.masterDifficulty && difficulty==='hard' && score>=25) { achievements.masterDifficulty=true; saveAchievements(); addCoins(20); }
            if (!achievements.threeLivesPerfect && isThreeLives && lives===3 && score>=25) { achievements.threeLivesPerfect=true; saveAchievements(); addCoins(25); }
        }
        
        function moveSnake() {
            if (!gameActive || paused) return;
            direction = nextDir;
            let newHead = {...snake[0]};
            switch(direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT': newHead.x--; break;
                case 'UP': newHead.y--; break;
                case 'DOWN': newHead.y++; break;
            }
            const willEat = (newHead.x===food.x && newHead.y===food.y);
            if (bonus && bonus.active && newHead.x===bonus.x && newHead.y===bonus.y) { eatBonus(bonus); addParticles(bonus.x*CELL_SIZE, bonus.y*CELL_SIZE); }
            if (willEat) {
                snake.unshift(newHead);
                let addScore = (activeEffects.scoreMult>1 && Date.now()<activeEffects.effectEndTime) ? 2 : 1;
                score += addScore;
                updateScoreUI();
                addParticles(food.x*CELL_SIZE, food.y*CELL_SIZE);
                playSound('eat');
                if (checkWin()) return;
                if (score % 5 === 0 && speedMs > 70) {
                    speedMs = Math.max(70, speedMs - speedInc);
                    if (!paused && gameActive) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs / (activeEffects.speedMult||1)); }
                }
                generateRandomFood();
                turnCounter = 0; // сброс акробата при еде
            } else {
                // проверка на акробата (повороты)
                if (direction !== nextDir) turnCounter++;
                else turnCounter = 0;
                if (!achievements.acrobat && turnCounter >= 5) { achievements.acrobat = true; saveAchievements(); addCoins(20); }
                snake.unshift(newHead);
                snake.pop();
            }
            if (!bonus || !bonus.active) spawnBonus();
            if (bonus && bonus.active && Date.now() > bonus.endTime) { bonus.active=false; bonus=null; }
            if (activeEffects.effectEndTime && Date.now() > activeEffects.effectEndTime) {
                activeEffects.speedMult=1; activeEffects.scoreMult=1;
                if (!paused && gameActive) { clearInterval(gameLoop); gameLoop = setInterval(gameTick, speedMs); }
            }
            const head = snake[0];
            if (head.x<0 || head.x>=GRID_SIZE || head.y<0 || head.y>=GRID_SIZE) { gameOver(); return; }
            for (let i=1; i<snake.length; i++) if (snake[i].x===head.x && snake[i].y===head.y) { gameOver(); return; }
            draw();
        }
        
        function gameTick() { moveSnake(); updateParticles(); }
        
        function draw() {
            if (grassLoaded && grass.complete && grass.naturalWidth>0) ctx.drawImage(grass,0,0,canvas.width,canvas.height);
            else { ctx.fillStyle="#2d1f3a"; ctx.fillRect(0,0,canvas.width,canvas.height); }
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
            for(let i=0;i<=GRID_SIZE;i++){ ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(canvas.width,i*CELL_SIZE); ctx.stroke(); }
            // еда
            const foodImg = new Image();
            foodImg.src = "https://i.pinimg.com/474x/fd/f9/de/fdf9de1262b8ad9522b6ff90b772f46f.jpg?nii=t";
            if (foodImg.complete && foodImg.naturalWidth>0) ctx.drawImage(foodImg, food.x*CELL_SIZE, food.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
            else { ctx.fillStyle="#E31837"; ctx.beginPath(); ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.4,0,2*Math.PI); ctx.fill(); ctx.fillStyle="white"; ctx.font=`bold ${CELL_SIZE*0.6}px monospace`; ctx.fillText("P", food.x*CELL_SIZE+CELL_SIZE*0.35, food.y*CELL_SIZE+CELL_SIZE*0.7); }
            // бонус
            if (bonus && bonus.active) {
                ctx.fillStyle = bonus.type===0?"#00ffaa":(bonus.type===1?"#66ccff":"#ffcc44");
                ctx.beginPath(); ctx.arc(bonus.x*CELL_SIZE+CELL_SIZE/2, bonus.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE*0.3,0,2*Math.PI); ctx.fill();
                ctx.fillStyle="white"; ctx.font=`bold ${CELL_SIZE*0.5}px monospace`; ctx.fillText(bonus.type===0?"⚡":(bonus.type===1?"🐢":"2x"), bonus.x*CELL_SIZE+CELL_SIZE*0.35, bonus.y*CELL_SIZE+CELL_SIZE*0.7);
            }
            // змейка
            for(let i=0; i<snake.length; i++) {
                const s = snake[i];
                const x=s.x*CELL_SIZE, y=s.y*CELL_SIZE;
                const isHead = (i===0);
                if(isHead && headLoaded && headImage.complete && headImage.naturalWidth>0) ctx.drawImage(headImage, x, y, CELL_SIZE, CELL_SIZE);
                else if(!isHead && tailLoaded && tailImage.complete && tailImage.naturalWidth>0) ctx.drawImage(tailImage, x, y, CELL_SIZE, CELL_SIZE);
                else {
                    const r=CELL_SIZE*0.4;
                    ctx.beginPath(); ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, r+1,0,2*Math.PI); ctx.fillStyle="#6a3e9a"; ctx.fill();
                    ctx.beginPath(); ctx.arc(x+CELL_SIZE/2, y+CELL_SIZE/2, r,0,2*Math.PI); ctx.fillStyle=isHead?"#bc7eff":"#9a5fdf"; ctx.fill();
                    if(!isHead) { ctx.fillStyle="#e8d5ff"; ctx.font=`${CELL_SIZE*0.55}px "Segoe UI Emoji"`; ctx.fillText("🐍", x+CELL_SIZE/3, y+CELL_SIZE-6); }
                }
            }
            drawParticles();
            if(paused){
                ctx.fillStyle="rgba(0,0,0,0.7)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font="bold 30px system-ui"; ctx.fillStyle="white"; ctx.fillText("ПАУЗА", canvas.width/2-70, canvas.height/2);
            }
        }
        
        function changeDirection(newDir) {
            if (!gameActive || paused) return;
            const opp = {'UP':'DOWN','DOWN':'UP','LEFT':'RIGHT','RIGHT':'LEFT'};
            if (opp[newDir] !== direction) nextDir = newDir;
        }
        
        // Управление
        window.addEventListener('keydown', (e) => {
            const k=e.key;
            if (k==='ArrowUp') changeDirection('UP');
            else if (k==='ArrowDown') changeDirection('DOWN');
            else if (k==='ArrowLeft') changeDirection('LEFT');
            else if (k==='ArrowRight') changeDirection('RIGHT');
            e.preventDefault();
        });
        document.querySelectorAll('.dir-btn').forEach(btn => {
            const dir=btn.dataset.dir;
            btn.addEventListener('click', (e) => { e.preventDefault(); changeDirection(dir); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(dir); });
        });
        
        // Пауза
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            if(!gameActive) return;
            paused=!paused;
            if(paused) { if(gameLoop)clearInterval(gameLoop); gameLoop=null; pauseBtn.innerText='▶️ Старт'; }
            else { gameLoop=setInterval(gameTick, speedMs/(activeEffects.speedMult||1)); pauseBtn.innerText='⏸️ Пауза'; }
            draw();
        });
        
        document.getElementById('restartGameBtn').addEventListener('click', () => { if(gameLoop)clearInterval(gameLoop); initGame(); });
        document.getElementById('backToMenuBtn').addEventListener('click', () => window.location.href='index.html');
        
        initGame();
    })();
</script>
</body>
</html>

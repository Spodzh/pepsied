<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пепсиед — Победа!</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a0b2e, #2c1a48);
        }
        .win-bg {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #3a1f6e, #0f0719);
            padding: 20px;
        }
        .content {
            text-align: center;
            width: 90%;
            max-width: 550px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 25px 40px;
            border: 2px solid #ffcc44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease-out;
        }
        .win-image { width: 180px; max-width: 60%; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .win-text { font-size: 1.5rem; font-weight: bold; color: #ffd966; text-shadow: 2px 2px 5px black; margin-bottom: 25px; line-height: 1.3; }
        .support-title { font-size: 1.2rem; color: #ffffffcc; margin-bottom: 15px; letter-spacing: 1px; }
        .social-buttons { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .social-btn {
            background: #2c1a48; border: 1px solid #a55eff; border-radius: 60px; padding: 10px 22px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; backdrop-filter: blur(4px);
        }
        .social-btn img { width: 24px; height: 24px; }
        .social-btn.tg:hover { background: #0088cc; }
        .social-btn.tt:hover { background: #000000; border-color: #ff0050; }
        .action-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .action-btn { background: #6600ff; border: none; padding: 12px 28px; border-radius: 60px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; }
        .action-btn:hover { background: #7c1aff; transform: scale(1.02); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        /* Лидерборд кнопка и панель */
        .leaderboard-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 50px;
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 12px black;
            backdrop-filter: blur(4px);
        }
        .leaderboard-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background: rgba(20,10,40,0.95);
            backdrop-filter: blur(16px);
            border-right: 2px solid #a55eff;
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
            color: white;
            font-family: monospace;
        }
        .leaderboard-panel.open { left: 0; }
        .leaderboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid #a55eff; padding-bottom: 10px; }
        .close-leaderboard { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .leaderboard-list { flex: 1; overflow-y: auto; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #a55eff66; font-size: 1.1rem; }
        .leaderboard-name { font-weight: bold; }
        .leaderboard-score { color: #ffd966; }
        .empty-leaderboard { text-align: center; color: #aaa; margin-top: 30px; }
        @media (max-width: 550px) {
            .win-image { width: 140px; }
            .win-text { font-size: 1.2rem; }
            .support-title { font-size: 1rem; }
            .social-btn { padding: 8px 16px; font-size: 0.85rem; }
            .action-btn { padding: 10px 20px; font-size: 0.9rem; }
            .leaderboard-btn { width: 45px; height: 45px; font-size: 1.5rem; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div class="win-bg">
        <div class="content">
            <img class="win-image" src="https://i.ibb.co/mM0d8Qg/image.png" alt="Победа">
            <div class="win-text">УРАААА ДАНА НАПИЛАСЬ НАКОНЕЦ-ТО СВОЕЙ ПЕПСИ!</div>
            <div class="support-title">📢 Поддержать автора</div>
            <div class="social-buttons">
                <button class="social-btn tg" id="tgSupportBtn"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="TG"> Telegram</button>
                <button class="social-btn tt" id="ttSupportBtn"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" alt="TT"> TikTok</button>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="playAgainBtn">🐍 Играть снова</button>
                <button class="action-btn" id="menuBtn">🏠 В главное меню</button>
            </div>
        </div>
    </div>

    <div class="leaderboard-btn" id="leaderboardBtn">🏆</div>
    <div class="leaderboard-panel" id="leaderboardPanel">
        <div class="leaderboard-header"><span>🏆 ТАБЛИЦА ЛИДЕРОВ 🏆</span><button class="close-leaderboard" id="closeLeaderboardBtn">✖</button></div>
        <div class="leaderboard-list" id="leaderboardList"><div class="empty-leaderboard">Загрузка...</div></div>
    </div>

    <script>
        function loadLeaderboard() {
            const stored = localStorage.getItem('pepsiedLeaderboard');
            let leaderboard = stored ? JSON.parse(stored) : [];
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            if (leaderboard.length === 0) { container.innerHTML = '<div class="empty-leaderboard">Пока нет рекордов</div>'; return; }
            const sorted = [...leaderboard].sort((a,b)=>b.score - a.score).slice(0,5);
            container.innerHTML = sorted.map(entry => `<div class="leaderboard-item"><span class="leaderboard-name">${escapeHtml(entry.name)}</span><span class="leaderboard-score">${entry.score} 🍕</span></div>`).join('');
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
        const leaderboardBtn = document.getElementById('leaderboardBtn');
        const panel = document.getElementById('leaderboardPanel');
        const closeBtn = document.getElementById('closeLeaderboardBtn');
        function openPanel() { panel.classList.add('open'); }
        function closePanel() { panel.classList.remove('open'); }
        leaderboardBtn.addEventListener('click', openPanel);
        closeBtn.addEventListener('click', closePanel);
        document.addEventListener('click', (e) => { if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== leaderboardBtn) closePanel(); });
        loadLeaderboard();

        document.getElementById('tgSupportBtn').addEventListener('click', () => { window.open('https://www.tiktok.com/link/v2?aid=1988&lang=ru-RU&scene=bio_url&target=https%3A%2F%2Ft.me%2Fssspodzh', '_blank'); });
        document.getElementById('ttSupportBtn').addEventListener('click', () => { window.open('https://www.tiktok.com/@spodzh', '_blank'); });
        document.getElementById('playAgainBtn').addEventListener('click', () => { window.location.href = 'snake.html'; });
        document.getElementById('menuBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пепсиед — Впусти пепси в свою жизнь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', system-ui, 'Inter', sans-serif;
            background-color: #0a0c12;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/Zp4JX1r3/2.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, rgba(10,12,18,0.3) 0%, rgba(30,10,40,0.7) 100%);
            pointer-events: none;
        }

        .right-content {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 40px 60px 40px 30px;
            text-align: right;
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .game-title {
            font-size: 6rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 10px 25px rgba(0,0,0,0.6);
            letter-spacing: 6px;
            background: linear-gradient(135deg, #FFFFFF, #E0B0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 25px;
        }

        .description {
            font-size: 2rem;
            font-weight: 600;
            color: #F0F3FA;
            text-shadow: 0 3px 8px rgba(0,0,0,0.5);
            max-width: 600px;
            margin-top: 15px;
            line-height: 1.4;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 55px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .start-btn, .skin-btn {
            background: #6600ff;
            border: none;
            padding: 18px 50px;
            border-radius: 80px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 12px 25px rgba(102, 0, 255, 0.4);
            letter-spacing: 2px;
            font-family: inherit;
        }

        .skin-btn {
            background: #3a1a6e;
            font-size: 1.5rem;
            padding: 18px 35px;
        }

        .start-btn:hover, .skin-btn:hover {
            background: #7c1aff;
            transform: scale(1.02);
            box-shadow: 0 16px 30px rgba(102, 0, 255, 0.6);
        }

        .start-btn:active, .skin-btn:active {
            transform: scale(0.98);
        }

        .dev-credit {
            position: absolute;
            bottom: 28px;
            right: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255,245,210,0.9);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            z-index: 2;
        }

        /* Модальное окно выбора скина */
        .skin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .skin-modal-content {
            background: #2c1a48;
            border-radius: 60px;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 2px solid #a55eff;
            box-shadow: 0 20px 40px black;
        }
        .skin-modal-content h2 {
            color: white;
            margin-bottom: 20px;
        }
        .skin-preview {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            background: #1a0b2e;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .skin-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .skin-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 25px;
        }
        .nav-arrow {
            background: #5f2e9e;
            border: none;
            color: white;
            font-size: 2.5rem;
            padding: 5px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
        }
        .nav-arrow:active {
            transform: scale(0.9);
        }
        .skin-name {
            color: #ffd966;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .select-skin-btn {
            background: #6600ff;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .close-skin-modal {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1rem;
            margin-top: 15px;
            cursor: pointer;
        }

        @media (max-width: 850px) {
            .right-content {
                width: 70%;
                padding: 30px 30px 30px 20px;
            }
            .game-title { font-size: 3.5rem; }
            .description { font-size: 1.4rem; }
            .start-btn { font-size: 1.5rem; padding: 12px 32px; }
            .skin-btn { font-size: 1.2rem; padding: 12px 25px; }
            .dev-credit { right: 30px; bottom: 18px; font-size: 0.9rem; }
        }

        @media (max-width: 550px) {
            .right-content {
                width: 85%;
                padding: 20px 20px 20px 15px;
            }
            .game-title { font-size: 2.5rem; letter-spacing: 3px; }
            .description { font-size: 1.2rem; }
            .start-btn { font-size: 1.3rem; padding: 10px 26px; margin-top: 30px; }
            .skin-btn { font-size: 1rem; padding: 10px 20px; }
            .button-group { gap: 15px; margin-top: 35px; }
        }
    </style>
</head>
<body>
<div class="hero">
    <div class="right-content">
        <div class="game-title">ПЕПСИЕД</div>
        <div class="description">
            Донится любит пепси.<br>
            Помоги ей съесть все пепси!!!
        </div>
        <div class="button-group">
            <button class="start-btn" id="goToGameBtn">Начать играть</button>
            <button class="skin-btn" id="openSkinBtn">👕 Выбрать скин</button>
        </div>
    </div>
    <div class="dev-credit">Разработчик Влад Spodzh</div>
</div>

<!-- Модальное окно выбора скина -->
<div id="skinModal" class="skin-modal">
    <div class="skin-modal-content">
        <h2>Выбери голову змеи</h2>
        <div class="skin-preview">
            <img id="skinPreview" src="https://i.ibb.co/pBkq71nP/412421.png" alt="Скин">
        </div>
        <div class="skin-nav">
            <button class="nav-arrow" id="prevSkinBtn">◀</button>
            <button class="nav-arrow" id="nextSkinBtn">▶</button>
        </div>
        <div class="skin-name" id="skinName">Основной скин</div>
        <button class="select-skin-btn" id="selectSkinBtn">Выбрать</button>
        <button class="close-skin-modal" id="closeSkinModalBtn">Закрыть</button>
    </div>
</div>

<script>
    // Список скинов: [название, URL картинки]
    const skins = [
    { name: "Основной скин", url: "https://i.ibb.co/pBkq71nP/412421.png" },
    { name: "Новый скин", url: "https://i.ibb.co/VW19FvXh/image.png" }
];
    let currentSkinIndex = 0;
    
    // Загружаем выбранный скин из localStorage
    const savedSkinIndex = localStorage.getItem('pepsiedSkinIndex');
    if (savedSkinIndex !== null && savedSkinIndex >= 0 && savedSkinIndex < skins.length) {
        currentSkinIndex = parseInt(savedSkinIndex);
    }
    
    // Элементы модалки
    const modal = document.getElementById('skinModal');
    const openBtn = document.getElementById('openSkinBtn');
    const closeBtn = document.getElementById('closeSkinModalBtn');
    const prevBtn = document.getElementById('prevSkinBtn');
    const nextBtn = document.getElementById('nextSkinBtn');
    const selectBtn = document.getElementById('selectSkinBtn');
    const skinPreview = document.getElementById('skinPreview');
    const skinNameSpan = document.getElementById('skinName');
    
    function updatePreview() {
        skinPreview.src = skins[currentSkinIndex].url;
        skinNameSpan.innerText = skins[currentSkinIndex].name;
    }
    
    function openModal() {
        updatePreview();
        modal.style.display = 'flex';
    }
    
    function closeModal() {
        modal.style.display = 'none';
    }
    
    function selectSkin() {
        localStorage.setItem('pepsiedSkinIndex', currentSkinIndex);
        closeModal();
    }
    
    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    selectBtn.addEventListener('click', selectSkin);
    prevBtn.addEventListener('click', () => {
        currentSkinIndex = (currentSkinIndex - 1 + skins.length) % skins.length;
        updatePreview();
    });
    nextBtn.addEventListener('click', () => {
        currentSkinIndex = (currentSkinIndex + 1) % skins.length;
        updatePreview();
    });
    
    // Закрыть модалку по клику вне содержимого
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    
    // Переход в игру
    document.getElementById('goToGameBtn').addEventListener('click', () => {
        window.location.href = 'snake.html';
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пепсиед — Впусти пепси в свою жизнь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            font-family: 'Segoe UI', 'Montserrat', system-ui, 'Inter', sans-serif;
            background-color: #0a0c12;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-image: url('https://i.ibb.co/Zp4JX1r3/2.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow-y: auto;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: linear-gradient(135deg, rgba(10,12,18,0.4) 0%, rgba(30,10,40,0.8) 100%);
            pointer-events: none;
        }

        .right-content {
            position: relative;
            width: 55%;
            max-width: 650px;
            padding: 20px 40px 30px 30px;
            text-align: right;
            backdrop-filter: blur(3px);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .game-title {
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 15px #ff66cc, 0 0 30px #6600ff;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347, #FF66CC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: titlePulse 2s infinite alternate;
            line-height: 1.2;
        }
        @keyframes titlePulse {
            0% { text-shadow: 0 0 10px #ff66cc, 0 0 20px #6600ff; }
            100% { text-shadow: 0 0 25px #ff66cc, 0 0 45px #6600ff; }
        }

        .description {
            font-size: 1.3rem;
            font-weight: 600;
            color: #F0F3FA;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        .stats-cards {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin: 5px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .stat-icon {
            font-size: 1.4rem;
        }
        .stat-info {
            text-align: left;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #ffd966;
        }
        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            color: white;
        }
        .exp-bar {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-top: 3px;
        }
        .exp-fill {
            height: 100%;
            background: #ffcc44;
            width: 0%;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 5px 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn {
            background: linear-gradient(135deg, #6600ff, #9a4dff);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(102, 0, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #9a4dff;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(102, 0, 255, 0.5);
        }

        .coin-display {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 4px 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffcc44;
            border: 1px solid #ffcc44;
            margin-left: auto;
            width: fit-content;
        }

        /* Ежедневные задания - горизонтально, компактно */
        .daily-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 8px 15px;
            margin-top: 8px;
            border: 1px solid rgba(255,204,68,0.4);
        }
        .daily-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .daily-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffcc44;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .daily-reward {
            background: rgba(255,204,68,0.2);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #ffcc44;
        }
        .daily-quests {
            display: flex;
            gap: 15px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }
        .quest-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .quest-icon {
            font-size: 1rem;
        }
        .quest-text {
            color: white;
        }
        .quest-progress {
            width: 60px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .quest-fill {
            height: 100%;
            background: #ffcc44;
        }
        .quest-completed {
            color: #ffcc44;
            font-size: 0.7rem;
        }

        .dev-credit {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            z-index: 3;
        }

        /* Модальные окна (оставляем прежними, но уменьшаем размер) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2c1a48;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 2px solid #a55eff;
            color: white;
            max-height: 80vh;
            overflow-y: auto;
        }
        /* Остальные стили модалок (вкладки, предметы) такие же, но уменьшим отступы */
        .shop-item {
            padding: 8px;
            font-size: 0.9rem;
        }
        .achievement-item {
            padding: 8px;
            font-size: 0.8rem;
        }
        .settings-item {
            margin: 10px 0;
        }
        .skin-preview {
            width: 100px;
            height: 100px;
        }
        .nav-arrow {
            font-size: 1.8rem;
            padding: 2px 15px;
        }
        .difficulty-option, .mode-option {
            padding: 8px 15px;
        }

        @media (max-width: 850px) {
            .right-content {
                width: 70%;
                padding: 15px 30px;
            }
            .game-title {
                font-size: 2.8rem;
            }
            .description {
                font-size: 1rem;
            }
            .btn {
                padding: 5px 12px;
                font-size: 0.75rem;
                white-space: nowrap;
            }
            .stat-card {
                padding: 4px 10px;
            }
            .stat-value {
                font-size: 0.8rem;
            }
            .daily-quests {
                justify-content: flex-end;
            }
        }
        @media (max-width: 600px) {
            .right-content {
                width: 85%;
                padding: 12px 20px;
            }
            .game-title {
                font-size: 2.2rem;
            }
            .description {
                font-size: 0.9rem;
            }
            .button-group {
                gap: 6px;
            }
            .btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            .stats-cards {
                gap: 8px;
            }
            .stat-card {
                padding: 3px 8px;
            }
            .daily-quests {
                flex-direction: column;
                align-items: flex-end;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
<div class="hero">
    <div class="right-content">
        <div class="game-title">ПЕПСИЕД</div>
        <div class="description">Донится любит пепси.<br>Помоги ей съесть все пепси!!!</div>

        <div style="display: flex; justify-content: flex-end;">
            <div class="coin-display"><span>🪙</span><span id="coinAmount">0</span></div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon">🏅</div>
                <div class="stat-info">
                    <div class="stat-label">РАНГ</div>
                    <div class="stat-value" id="rankDisplay">Без пепси</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🐍</div>
                <div class="stat-info">
                    <div class="stat-label">УРОВЕНЬ</div>
                    <div class="stat-value" id="levelDisplay">1</div>
                    <div class="exp-bar"><div class="exp-fill" id="expFill"></div></div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn" id="goToGameBtn">▶ ИГРАТЬ</button>
            <button class="btn btn-outline" id="openSkinBtn">👕 Скины</button>
            <button class="btn btn-outline" id="openShopBtn">🛒 Магазин</button>
            <button class="btn btn-outline" id="openModesBtn">🎮 Режимы</button>
            <button class="btn btn-outline" id="openAchievementsBtn">🏆 Достижения</button>
            <button class="btn btn-outline" id="openStatsBtn">📊 Статистика</button>
            <button class="btn btn-outline" id="openSettingsBtn">⚙️ Настройки</button>
        </div>

        <div class="daily-card">
            <div class="daily-header">
                <div class="daily-title">📅 ЕЖЕДНЕВНЫЕ ЗАДАНИЯ</div>
                <div class="daily-reward">🎁 +20 🪙</div>
            </div>
            <div class="daily-quests" id="dailyQuestsList"></div>
        </div>
    </div>
    <div class="dev-credit">Разработчик Влад Spodzh</div>
</div>

<!-- Все модальные окна (содержимое идентично предыдущей версии, но сокращённое для экономии места) -->
<div id="skinModal" class="modal"><div class="modal-content"><h2>Выбери голову</h2><div class="skin-preview" id="skinPreviewContainer"><img id="skinPreview" src=""></div><div class="skin-nav"><button class="nav-arrow" id="prevSkinBtn">◀</button><button class="nav-arrow" id="nextSkinBtn">▶</button></div><div class="skin-name" id="skinName"></div><div class="skin-price" id="skinPrice"></div><button class="select-skin-btn" id="selectSkinBtn">Выбрать</button><button class="close-modal-btn" id="closeSkinModalBtn">Закрыть</button></div></div>
<div id="shopModal" class="modal"><div class="modal-content"><h2>🛒 Магазин</h2><div class="shop-tabs"><button class="tab-btn active" data-tab="heads">Головы</button><button class="tab-btn" data-tab="tails">Хвосты</button></div><div id="shopHeadsList"></div><div id="shopTailsList" style="display:none;"></div><div id="shopMessage" style="font-size:0.8rem;"></div><button class="close-modal-btn" id="closeShopModalBtn">Закрыть</button></div></div>
<div id="achievementsModal" class="modal"><div class="modal-content"><h2>🏆 Достижения</h2><div id="achievementsList"></div><button class="close-modal-btn" id="closeAchievementsBtn">Закрыть</button></div></div>
<div id="statsModal" class="modal"><div class="modal-content"><h2>📊 Статистика</h2><div id="statsList" class="stats-list"></div><button class="close-modal-btn" id="closeStatsBtn">Закрыть</button></div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><h2>⚙️ Настройки</h2><div class="settings-item"><label>🎮 Сенсорные кнопки</label><div id="touchToggle" class="toggle-switch"></div></div><div class="settings-item"><label>🔊 Громкость</label><input type="range" id="volumeSlider" min="0" max="100" value="70"></div><div class="settings-item"><label>🌙 Тёмный режим</label><div id="darkModeToggle" class="toggle-switch"></div></div><div class="settings-item"><label>⚙️ Сложность</label><div id="difficultySettingsDisplay" style="background:#1a0b2e; padding:3px 12px; border-radius:30px; cursor:pointer;"></div></div><button class="close-modal-btn" id="closeSettingsBtn">Закрыть</button></div></div>
<div id="modesModal" class="modal"><div class="modal-content"><h2>🎮 Режимы игры</h2><div class="mode-options" id="modeOptions"></div><button class="close-modal-btn" id="closeModesBtn">Закрыть</button></div></div>
<div id="difficultyModal" class="modal"><div class="modal-content"><h2>⚙️ Сложность</h2><div class="difficulty-options"><div class="difficulty-option" data-diff="easy">🌿 Лёгкий</div><div class="difficulty-option" data-diff="normal">⚡ Средний</div><div class="difficulty-option" data-diff="hard">🔥 Сложный</div></div><button class="close-modal-btn" id="closeDifficultyBtn">Закрыть</button></div></div>

<script>
    // ======================== ПОЛНЫЙ ФУНКЦИОНАЛ (сжато, но полностью рабочее) ========================
    // Данные
    let coins = localStorage.getItem('pepsiedCoins') ? parseInt(localStorage.getItem('pepsiedCoins')) : 0;
    let totalCollected = localStorage.getItem('pepsiedTotalCollected') ? parseInt(localStorage.getItem('pepsiedTotalCollected')) : 0;
    let snakeLevel = localStorage.getItem('pepsiedSnakeLevel') ? parseInt(localStorage.getItem('pepsiedSnakeLevel')) : 1;
    let snakeExp = localStorage.getItem('pepsiedSnakeExp') ? parseInt(localStorage.getItem('pepsiedSnakeExp')) : 0;
    const expPerLevel = 100;
    function updateRankAndExp() {
        const ranks = ["Без пепси","Любитель пепси","Пепси-эксперт","Пепси-мастер","Пепси-легенда","Пепси-король"];
        let idx = 0;
        if (totalCollected >= 10) idx=1; if (totalCollected>=50) idx=2; if (totalCollected>=100) idx=3; if (totalCollected>=200) idx=4; if (totalCollected>=500) idx=5;
        document.getElementById('rankDisplay').innerText = ranks[idx];
        document.getElementById('levelDisplay').innerText = snakeLevel;
        document.getElementById('expFill').style.width = (snakeExp/expPerLevel*100)+'%';
    }
    updateRankAndExp();
    function updateCoinDisplay() { document.getElementById('coinAmount').innerText = coins; }
    updateCoinDisplay();

    // Ежедневные задания
    let dailyQuests = JSON.parse(localStorage.getItem('pepsiedDailyQuests')) || { collect: 0, surviveTime: 0, completed: false, lastReset: new Date().toDateString() };
    function refreshDaily() {
        const today = new Date().toDateString();
        if (dailyQuests.lastReset !== today) {
            dailyQuests = { collect: 0, surviveTime: 0, completed: false, lastReset: today };
            localStorage.setItem('pepsiedDailyQuests', JSON.stringify(dailyQuests));
        }
        const collectPercent = Math.min(100, dailyQuests.collect/50*100);
        const timePercent = Math.min(100, dailyQuests.surviveTime/120*100);
        document.getElementById('dailyQuestsList').innerHTML = `
            <div class="quest-item"><span class="quest-icon">🥤</span><span class="quest-text">${dailyQuests.collect}/50</span><div class="quest-progress"><div class="quest-fill" style="width:${collectPercent}%"></div></div>${dailyQuests.collect>=50?'✅':''}</div>
            <div class="quest-item"><span class="quest-icon">⏱️</span><span class="quest-text">${dailyQuests.surviveTime}/120с</span><div class="quest-progress"><div class="quest-fill" style="width:${timePercent}%"></div></div>${dailyQuests.surviveTime>=120?'✅':''}</div>
            ${dailyQuests.completed ? '<div class="quest-item">🎉 Выполнено! +20🪙</div>' : ''}
        `;
    }
    refreshDaily();

    // Скины голов
    const headSkins = [
        { name:"Дана", url:"https://i.ibb.co/pBkq71nP/412421.png", price:0 },
        { name:"Настя", url:"https://i.ibb.co/VW19FvXh/image.png", price:50 },
        { name:"Влад", url:"https://i.ibb.co/JW06HZK3/image.png", price:70 }
    ];
    let ownedHeads = JSON.parse(localStorage.getItem('pepsiedOwnedHeads')) || [0];
    let currentHead = 0;
    if (localStorage.getItem('pepsiedHeadIndex') && ownedHeads.includes(parseInt(localStorage.getItem('pepsiedHeadIndex'))))
        currentHead = parseInt(localStorage.getItem('pepsiedHeadIndex'));
    // Хвосты
    const tailSkins = [
        { name:"Pepsi", icon:"🥤", price:0 },
        { name:"Пузыри", icon:"💧", price:80 },
        { name:"Пожарный шланг", icon:"🧯", price:120 },
        { name:"Колечки колы", icon:"⭕", price:150 },
        { name:"Светящаяся линия", icon:"✨", price:200 }
    ];
    let ownedTails = JSON.parse(localStorage.getItem('pepsiedOwnedTails')) || [0];
    let currentTail = 0;
    if (localStorage.getItem('pepsiedTailIndex') && ownedTails.includes(parseInt(localStorage.getItem('pepsiedTailIndex'))))
        currentTail = parseInt(localStorage.getItem('pepsiedTailIndex'));

    // Достижения и статистика (сокращённо)
    let achievements = {
        firstWin:false, fiftyCollected:false, speedDemon:false, skinChanger:false, bonusMaster:false,
        masterDifficulty:false, acrobat:false, endless100:false, threeLivesPerfect:false
    };
    const savedAch = localStorage.getItem('pepsiedAchievements');
    if (savedAch) try { achievements = JSON.parse(savedAch); } catch(e) {}
    function saveAchievements() { localStorage.setItem('pepsiedAchievements', JSON.stringify(achievements)); }
    let stats = { gamesPlayed:0, wins:0, deaths:0, totalBonusesEaten:0, totalCoinsEarned:0 };
    const savedStats = localStorage.getItem('pepsiedStats');
    if (savedStats) try { stats = JSON.parse(savedStats); } catch(e) {}
    function saveStats() { localStorage.setItem('pepsiedStats', JSON.stringify(stats)); }

    function renderAchievements() {
        const list = [
            {id:'firstWin',icon:'🏆',title:'Первая победа'},
            {id:'fiftyCollected',icon:'🥤',title:'Коллекционер'},
            {id:'speedDemon',icon:'⚡',title:'Скоростной демон'},
            {id:'skinChanger',icon:'🎨',title:'Стилист'},
            {id:'bonusMaster',icon:'✨',title:'Бонусный мастер'},
            {id:'masterDifficulty',icon:'🔥',title:'Мастер сложности'},
            {id:'acrobat',icon:'🌀',title:'Акробат'},
            {id:'endless100',icon:'♾️',title:'Бесконечность'},
            {id:'threeLivesPerfect',icon:'❤️',title:'Любитель жизней'}
        ];
        const container = document.getElementById('achievementsList');
        if(container) container.innerHTML = list.map(ach => `<div class="achievement-item ${!achievements[ach.id]?'achievement-locked':''}"><div class="achievement-icon">${ach.icon}</div><div class="achievement-text">${ach.title} ${achievements[ach.id]?'✅':'🔒'}</div></div>`).join('');
    }
    function renderStats() {
        const container = document.getElementById('statsList');
        if(container) container.innerHTML = `
            <div class="stats-item">🎮 Игр: ${stats.gamesPlayed}</div>
            <div class="stats-item">🏆 Побед: ${stats.wins}</div>
            <div class="stats-item">💀 Смертей: ${stats.deaths}</div>
            <div class="stats-item">✨ Бонусов: ${stats.totalBonusesEaten}</div>
            <div class="stats-item">🪙 Монет всего: ${stats.totalCoinsEarned}</div>
            <div class="stats-item">🥤 Банок всего: ${totalCollected}</div>
        `;
    }

    // Магазин
    function renderShopHeads() {
        const notOwned = headSkins.filter((_,i)=>!ownedHeads.includes(i) && headSkins[i].price>0);
        const container = document.getElementById('shopHeadsList');
        if(!container) return;
        if(notOwned.length===0) { container.innerHTML='<div>✨ Все головы куплены</div>'; return; }
        container.innerHTML = notOwned.map(skin=>{
            const idx = headSkins.findIndex(s=>s.name===skin.name);
            return `<div class="shop-item"><img src="${skin.url}" style="width:40px;height:40px;object-fit:contain;"><span>${skin.name}</span><span>${skin.price}🪙</span><button class="buy-btn" data-type="head" data-idx="${idx}">Купить</button></div>`;
        }).join('');
        document.querySelectorAll('.buy-btn[data-type="head"]').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let idx = parseInt(btn.dataset.idx);
                if(ownedHeads.includes(idx)) return;
                if(coins>=headSkins[idx].price){
                    coins-=headSkins[idx].price;
                    localStorage.setItem('pepsiedCoins',coins);
                    updateCoinDisplay();
                    ownedHeads.push(idx);
                    localStorage.setItem('pepsiedOwnedHeads',JSON.stringify(ownedHeads));
                    renderShopHeads();
                    document.getElementById('shopMessage').innerText = `Куплена голова "${headSkins[idx].name}"`;
                } else document.getElementById('shopMessage').innerText = 'Недостаточно монет';
            });
        });
    }
    function renderShopTails() {
        const notOwned = tailSkins.filter((_,i)=>!ownedTails.includes(i) && tailSkins[i].price>0);
        const container = document.getElementById('shopTailsList');
        if(!container) return;
        if(notOwned.length===0) { container.innerHTML='<div>✨ Все хвосты куплены</div>'; return; }
        container.innerHTML = notOwned.map(tail=>{
            const idx = tailSkins.findIndex(t=>t.name===tail.name);
            return `<div class="shop-item"><span style="font-size:1.5rem;">${tail.icon}</span><span>${tail.name}</span><span>${tail.price}🪙</span><button class="buy-btn" data-type="tail" data-idx="${idx}">Купить</button></div>`;
        }).join('');
        document.querySelectorAll('.buy-btn[data-type="tail"]').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let idx = parseInt(btn.dataset.idx);
                if(ownedTails.includes(idx)) return;
                if(coins>=tailSkins[idx].price){
                    coins-=tailSkins[idx].price;
                    localStorage.setItem('pepsiedCoins',coins);
                    updateCoinDisplay();
                    ownedTails.push(idx);
                    localStorage.setItem('pepsiedOwnedTails',JSON.stringify(ownedTails));
                    renderShopTails();
                    document.getElementById('shopMessage').innerText = `Куплен хвост "${tailSkins[idx].name}"`;
                } else document.getElementById('shopMessage').innerText = 'Недостаточно монет';
            });
        });
    }

    // Настройки
    let touchEnabled = localStorage.getItem('pepsiedTouchEnabled') !== 'false';
    let volume = localStorage.getItem('pepsiedVolume') ? parseInt(localStorage.getItem('pepsiedVolume')) : 70;
    let darkMode = localStorage.getItem('pepsiedDarkMode') === 'true';
    let currentDifficulty = localStorage.getItem('pepsiedDifficulty') || "normal";
    const diffNames = { easy:"🌿 Лёгкий", normal:"⚡ Средний", hard:"🔥 Сложный" };
    function applySettingsUI() {
        const touch = document.getElementById('touchToggle');
        if(touch) touch.classList.toggle('active', touchEnabled);
        const vol = document.getElementById('volumeSlider');
        if(vol) vol.value = volume;
        const dark = document.getElementById('darkModeToggle');
        if(dark) dark.classList.toggle('active', darkMode);
        const diffSpan = document.getElementById('difficultySettingsDisplay');
        if(diffSpan) diffSpan.innerText = diffNames[currentDifficulty];
    }
    document.getElementById('touchToggle')?.addEventListener('click',()=>{ touchEnabled=!touchEnabled; localStorage.setItem('pepsiedTouchEnabled',touchEnabled); applySettingsUI(); });
    document.getElementById('volumeSlider')?.addEventListener('input',(e)=>{ volume=parseInt(e.target.value); localStorage.setItem('pepsiedVolume',volume); });
    document.getElementById('darkModeToggle')?.addEventListener('click',()=>{ darkMode=!darkMode; localStorage.setItem('pepsiedDarkMode',darkMode); applySettingsUI(); });
    document.getElementById('difficultySettingsDisplay')?.addEventListener('click',()=>document.getElementById('difficultyModal').style.display='flex');

    // Модалки
    const modals = {
        skin:document.getElementById('skinModal'), shop:document.getElementById('shopModal'), achievements:document.getElementById('achievementsModal'),
        stats:document.getElementById('statsModal'), settings:document.getElementById('settingsModal'), modes:document.getElementById('modesModal'),
        difficulty:document.getElementById('difficultyModal')
    };
    function openModal(m){ if(m) m.style.display='flex'; }
    function closeModal(m){ if(m) m.style.display='none'; }
    document.getElementById('openSkinBtn')?.addEventListener('click',()=>openModal(modals.skin));
    document.getElementById('openShopBtn')?.addEventListener('click',()=>{ renderShopHeads(); renderShopTails(); openModal(modals.shop); });
    document.getElementById('openAchievementsBtn')?.addEventListener('click',()=>{ renderAchievements(); openModal(modals.achievements); });
    document.getElementById('openStatsBtn')?.addEventListener('click',()=>{ renderStats(); openModal(modals.stats); });
    document.getElementById('openSettingsBtn')?.addEventListener('click',()=>{ applySettingsUI(); openModal(modals.settings); });
    document.getElementById('openModesBtn')?.addEventListener('click',()=>{ renderModesModal(); openModal(modals.modes); });
    document.querySelectorAll('.close-modal-btn').forEach(btn=>btn.addEventListener('click',()=>{ let m=btn.closest('.modal'); if(m) closeModal(m); }));
    // Закрытие по клику на фон
    Object.values(modals).forEach(m=>{ if(m) m.addEventListener('click',(e)=>{ if(e.target===m) closeModal(m); }); });

    // Режимы игры
    let gameMode = localStorage.getItem('pepsiedGameMode') || "classic";
    const modesList = [
        { id:"classic", name:"Классический", desc:"25 очков", icon:"🎮" },
        { id:"endless", name:"Бесконечность", desc:"Нет лимита", icon:"♾️" },
        { id:"3lives", name:"3 жизни", desc:"3 попытки", icon:"❤️" }
    ];
    function renderModesModal() {
        const container = document.getElementById('modeOptions');
        if(!container) return;
        container.innerHTML = modesList.map(m=>`<div class="mode-option ${gameMode===m.id?'selected':''}" data-mode="${m.id}"><div class="mode-option-icon">${m.icon}</div><div class="mode-option-text"><div>${m.name}</div><div class="mode-option-desc">${m.desc}</div></div></div>`).join('');
        document.querySelectorAll('.mode-option').forEach(opt=>{
            opt.addEventListener('click',()=>{
                gameMode = opt.getAttribute('data-mode');
                localStorage.setItem('pepsiedGameMode',gameMode);
                renderModesModal();
                closeModal(modals.modes);
            });
        });
    }

    // Выбор сложности
    document.querySelectorAll('.difficulty-option').forEach(opt=>{
        opt.addEventListener('click',()=>{
            currentDifficulty = opt.getAttribute('data-diff');
            localStorage.setItem('pepsiedDifficulty',currentDifficulty);
            applySettingsUI();
            closeModal(modals.difficulty);
        });
    });

    // Модалка выбора скина головы
    let tempHead = currentHead;
    function updateSkinModal() {
        const skin = headSkins[tempHead];
        document.getElementById('skinPreview').src = skin.url;
        document.getElementById('skinName').innerText = skin.name;
        const owned = ownedHeads.includes(tempHead);
        document.getElementById('skinPrice').innerHTML = owned ? '✅ Владелец' : `🔒 ${skin.price}🪙`;
        document.getElementById('selectSkinBtn').disabled = !owned;
        document.getElementById('selectSkinBtn').innerText = owned ? 'Выбрать' : 'Заблокировано';
        const container = document.getElementById('skinPreviewContainer');
        if(tempHead===currentHead && owned) container.classList.add('selected');
        else container.classList.remove('selected');
    }
    document.getElementById('prevSkinBtn')?.addEventListener('click',()=>{ tempHead=(tempHead-1+headSkins.length)%headSkins.length; updateSkinModal(); });
    document.getElementById('nextSkinBtn')?.addEventListener('click',()=>{ tempHead=(tempHead+1)%headSkins.length; updateSkinModal(); });
    document.getElementById('selectSkinBtn')?.addEventListener('click',()=>{
        if(!ownedHeads.includes(tempHead)) return;
        if(tempHead!==currentHead){
            currentHead=tempHead;
            localStorage.setItem('pepsiedHeadIndex',currentHead);
            if(!achievements.skinChanger){ achievements.skinChanger=true; saveAchievements(); }
        }
        closeModal(modals.skin);
    });
    document.getElementById('closeSkinModalBtn')?.addEventListener('click',()=>closeModal(modals.skin));

    // Запуск игры
    document.getElementById('goToGameBtn')?.addEventListener('click',()=>window.location.href='snake.html');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пепсиед — Впусти пепси в свою жизнь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', system-ui, 'Inter', sans-serif;
            background-color: #0a0c12;
            position: relative;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/Zp4JX1r3/2.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, rgba(10,12,18,0.3) 0%, rgba(30,10,40,0.7) 100%);
            pointer-events: none;
        }

        .right-content {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 40px 60px 40px 30px;
            text-align: right;
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .game-title {
            font-size: 6rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 10px 25px rgba(0,0,0,0.6);
            letter-spacing: 6px;
            background: linear-gradient(135deg, #FFFFFF, #E0B0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 25px;
        }

        .description {
            font-size: 2rem;
            font-weight: 600;
            color: #F0F3FA;
            text-shadow: 0 3px 8px rgba(0,0,0,0.5);
            max-width: 600px;
            margin-top: 15px;
            line-height: 1.4;
        }

        .start-btn {
            margin-top: 55px;
            background: #6600ff;
            border: none;
            padding: 18px 50px;
            border-radius: 80px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 12px 25px rgba(102, 0, 255, 0.4);
            letter-spacing: 2px;
            font-family: inherit;
        }

        .start-btn:hover {
            background: #7c1aff;
            transform: scale(1.02);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .dev-credit {
            position: absolute;
            bottom: 28px;
            right: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255,245,210,0.9);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            z-index: 2;
        }

        /* Плавающая кнопка лидеров */
        .leaderboard-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 50px;
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 12px black;
            backdrop-filter: blur(4px);
        }
        .leaderboard-btn:active {
            transform: scale(0.95);
        }

        /* Панель лидеров */
        .leaderboard-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background: rgba(20,10,40,0.95);
            backdrop-filter: blur(16px);
            border-right: 2px solid #a55eff;
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
            color: white;
            font-family: monospace;
        }
        .leaderboard-panel.open {
            left: 0;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 2px solid #a55eff;
            padding-bottom: 10px;
        }
        .close-leaderboard {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .leaderboard-list {
            flex: 1;
            overflow-y: auto;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #a55eff66;
            font-size: 1.1rem;
        }
        .leaderboard-name {
            font-weight: bold;
        }
        .leaderboard-score {
            color: #ffd966;
        }
        .empty-leaderboard {
            text-align: center;
            color: #aaa;
            margin-top: 30px;
        }

        /* Модальное окно для ввода имени (на главном экране) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }
        .modal-content {
            background: #2c1a48;
            border-radius: 48px;
            padding: 30px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            border: 2px solid #a55eff;
        }
        .modal-content h2 {
            color: white;
            margin-bottom: 20px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-content button {
            background: #6600ff;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        @media (max-width: 850px) {
            .right-content {
                width: 70%;
                padding: 30px 30px 30px 20px;
            }
            .game-title { font-size: 3.5rem; }
            .description { font-size: 1.4rem; }
            .start-btn { font-size: 1.5rem; padding: 12px 32px; }
            .dev-credit { right: 30px; bottom: 18px; font-size: 0.9rem; }
            .leaderboard-btn { width: 45px; height: 45px; font-size: 1.5rem; top: 10px; left: 10px; }
        }

        @media (max-width: 550px) {
            .right-content {
                width: 85%;
                padding: 20px 20px 20px 15px;
            }
            .game-title { font-size: 2.5rem; letter-spacing: 3px; }
            .description { font-size: 1.2rem; }
            .start-btn { font-size: 1.3rem; padding: 10px 26px; margin-top: 30px; }
            .hero {
                background-position: 85% center;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="right-content">
            <div class="game-title">ПЕПСИЕД</div>
            <div class="description">
                Донится любит пепси.<br>
                Помоги ей съесть все пепси!!!
            </div>
            <button class="start-btn" id="goToGameBtn">Начать играть</button>
        </div>
        <div class="dev-credit">Разработчик Влад Spodzh</div>
    </div>

    <!-- Кнопка лидеров -->
    <div class="leaderboard-btn" id="leaderboardBtn">🏆</div>
    <!-- Панель лидеров -->
    <div class="leaderboard-panel" id="leaderboardPanel">
        <div class="leaderboard-header">
            <span>🏆 ТАБЛИЦА ЛИДЕРОВ 🏆</span>
            <button class="close-leaderboard" id="closeLeaderboardBtn">✖</button>
        </div>
        <div class="leaderboard-list" id="leaderboardList">
            <div class="empty-leaderboard">Загрузка...</div>
        </div>
    </div>

    <!-- Модальное окно для ввода имени (показывается только если имя не задано) -->
    <div id="nameModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>🐍 Укажите ваше имя</h2>
            <input type="text" id="playerNameInput" maxlength="16" placeholder="Введите имя...">
            <button id="saveNameBtn">Сохранить</button>
        </div>
    </div>

    <script>
        // Работа с именем и лидерами
        let playerName = localStorage.getItem('pepsiedPlayerName');
        const nameModal = document.getElementById('nameModal');
        const playerNameInput = document.getElementById('playerNameInput');
        const saveNameBtn = document.getElementById('saveNameBtn');

        // Таблица лидеров
        let leaderboard = [];
        function loadLeaderboard() {
            const stored = localStorage.getItem('pepsiedLeaderboard');
            if (stored) {
                leaderboard = JSON.parse(stored);
            } else {
                leaderboard = [];
            }
            renderLeaderboard();
        }
        function saveLeaderboard() {
            localStorage.setItem('pepsiedLeaderboard', JSON.stringify(leaderboard));
        }
        function renderLeaderboard() {
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            if (leaderboard.length === 0) {
                container.innerHTML = '<div class="empty-leaderboard">Пока нет рекордов</div>';
                return;
            }
            const sorted = [...leaderboard].sort((a,b) => b.score - a.score);
            const top5 = sorted.slice(0,5);
            container.innerHTML = top5.map(entry => `
                <div class="leaderboard-item">
                    <span class="leaderboard-name">${escapeHtml(entry.name)}</span>
                    <span class="leaderboard-score">${entry.score} 🍕</span>
                </div>
            `).join('');
        }
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Показать модальное окно, если имя не задано
        if (!playerName) {
            nameModal.style.display = 'flex';
        } else {
            nameModal.style.display = 'none';
            loadLeaderboard();
        }

        saveNameBtn.addEventListener('click', () => {
            let newName = playerNameInput.value.trim();
            if (newName === "") {
                newName = "Аноним";
            }
            playerName = newName;
            localStorage.setItem('pepsiedPlayerName', playerName);
            nameModal.style.display = 'none';
            loadLeaderboard();
        });

        // Управление панелью лидеров
        const leaderboardBtn = document.getElementById('leaderboardBtn');
        const leaderboardPanel = document.getElementById('leaderboardPanel');
        const closeLeaderboardBtn = document.getElementById('closeLeaderboardBtn');
        function openLeaderboard() {
            leaderboardPanel.classList.add('open');
        }
        function closeLeaderboard() {
            leaderboardPanel.classList.remove('open');
        }
        leaderboardBtn.addEventListener('click', openLeaderboard);
        closeLeaderboardBtn.addEventListener('click', closeLeaderboard);
        // Закрытие по клику вне панели
        document.addEventListener('click', (e) => {
            if (leaderboardPanel.classList.contains('open') && !leaderboardPanel.contains(e.target) && e.target !== leaderboardBtn) {
                closeLeaderboard();
            }
        });

        // Переход в игру
        document.getElementById('goToGameBtn').addEventListener('click', () => {
            window.location.href = 'snake.html';
        });
    </script>
</body>
</html>

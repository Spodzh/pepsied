<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пепсиед — Поражение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif;
        }
        .gameover-bg {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/chdMMWZy/photo-2026-06-03-23-09-54.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .gameover-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 700px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 40px 30px;
            border: 2px solid #ff66cc;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .message {
            font-size: 2rem;
            font-weight: bold;
            color: #ffb86c;
            text-shadow: 2px 2px 10px black;
            margin-bottom: 40px;
            line-height: 1.3;
        }
        .buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #6600ff;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn:hover { background: #7c1aff; transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }
        /* Лидерборд кнопка и панель */
        .leaderboard-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #2c1a48;
            border: 2px solid #a55eff;
            border-radius: 50px;
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 12px black;
            backdrop-filter: blur(4px);
        }
        .leaderboard-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background: rgba(20,10,40,0.95);
            backdrop-filter: blur(16px);
            border-right: 2px solid #a55eff;
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
            color: white;
            font-family: monospace;
        }
        .leaderboard-panel.open { left: 0; }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 2px solid #a55eff;
            padding-bottom: 10px;
        }
        .close-leaderboard { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .leaderboard-list { flex: 1; overflow-y: auto; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #a55eff66; font-size: 1.1rem; }
        .leaderboard-name { font-weight: bold; }
        .leaderboard-score { color: #ffd966; }
        .empty-leaderboard { text-align: center; color: #aaa; margin-top: 30px; }
        @media (max-width: 550px) {
            .message { font-size: 1.4rem; }
            .btn { font-size: 1rem; padding: 10px 20px; }
            .content { padding: 30px 20px; }
            .leaderboard-btn { width: 45px; height: 45px; font-size: 1.5rem; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div class="gameover-bg">
        <div class="content">
            <div class="message">💀 Дане мало столько пепси, ей нужно БОЛЬШЕ!!! Начни заново 💀</div>
            <div class="buttons">
                <button class="btn" id="restartBtn">🔄 Начать заново</button>
                <button class="btn" id="menuBtn">🏠 В главное меню</button>
            </div>
        </div>
    </div>

    <div class="leaderboard-btn" id="leaderboardBtn">🏆</div>
    <div class="leaderboard-panel" id="leaderboardPanel">
        <div class="leaderboard-header">
            <span>🏆 ТАБЛИЦА ЛИДЕРОВ 🏆</span>
            <button class="close-leaderboard" id="closeLeaderboardBtn">✖</button>
        </div>
        <div class="leaderboard-list" id="leaderboardList">
            <div class="empty-leaderboard">Загрузка...</div>
        </div>
    </div>

    <script>
        function loadLeaderboard() {
            const stored = localStorage.getItem('pepsiedLeaderboard');
            let leaderboard = stored ? JSON.parse(stored) : [];
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            if (leaderboard.length === 0) {
                container.innerHTML = '<div class="empty-leaderboard">Пока нет рекордов</div>';
                return;
            }
            const sorted = [...leaderboard].sort((a,b)=>b.score - a.score).slice(0,5);
            container.innerHTML = sorted.map(entry => `
                <div class="leaderboard-item">
                    <span class="leaderboard-name">${escapeHtml(entry.name)}</span>
                    <span class="leaderboard-score">${entry.score} 🍕</span>
                </div>
            `).join('');
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
        const leaderboardBtn = document.getElementById('leaderboardBtn');
        const panel = document.getElementById('leaderboardPanel');
        const closeBtn = document.getElementById('closeLeaderboardBtn');
        function openPanel() { panel.classList.add('open'); }
        function closePanel() { panel.classList.remove('open'); }
        leaderboardBtn.addEventListener('click', openPanel);
        closeBtn.addEventListener('click', closePanel);
        document.addEventListener('click', (e) => {
            if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== leaderboardBtn) closePanel();
        });
        loadLeaderboard();

        document.getElementById('restartBtn').addEventListener('click', () => { window.location.href = 'snake.html'; });
        document.getElementById('menuBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    </script>
</body>
</html>

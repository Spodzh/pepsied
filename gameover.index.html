<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Пепсиед — Поражение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif;
        }

        /* Фон на весь экран */
        .gameover-bg {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/chdMMWZy/photo-2026-06-03-23-09-54.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* Затемнение для читаемости текста */
        .gameover-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* Центрированное содержимое */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 700px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 40px 30px;
            border: 2px solid #ff66cc;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .message {
            font-size: 2rem;
            font-weight: bold;
            color: #ffb86c;
            text-shadow: 2px 2px 10px black;
            margin-bottom: 40px;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #6600ff;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }

        .btn:hover {
            background: #7c1aff;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .message { font-size: 1.4rem; }
            .btn { font-size: 1rem; padding: 10px 20px; }
            .content { padding: 30px 20px; }
        }
    </style>
</head>
<body>
<div class="gameover-bg">
    <div class="content">
        <div class="message">
            💀 Дане мало столько пепси, ей нужно БОЛЬШЕ!!! Начни заново 💀
        </div>
        <div class="buttons">
            <button class="btn" id="restartBtn">🔄 Начать заново</button>
            <button class="btn" id="menuBtn">🏠 В главное меню</button>
        </div>
    </div>
</div>

<script>
    document.getElementById('restartBtn').addEventListener('click', () => {
        window.location.href = 'snake.html';
    });
    document.getElementById('menuBtn').addEventListener('click', () => {
        window.location.href = 'pepsied.html';
    });
</script>
</body>
</html>
